# Source: opentelemetry-demo/templates/posgresql-init-config.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: astronomy-cs-cz-postgresql-init
  labels:
    helm.sh/chart: opentelemetry-demo-0.40.9
    app.kubernetes.io/version: 2.2.0
    app.kubernetes.io/part-of: opentelemetry-demo
    app.kubernetes.io/managed-by: Helm
  namespace: otel-demo
data:
  init.sql: |
    -- Copyright The OpenTelemetry Authors
    -- SPDX-License-Identifier: Apache-2.0

    CREATE USER otelu WITH PASSWORD 'otelp';

    -- Accounting Service: create a schema
    CREATE SCHEMA accounting;
    GRANT USAGE ON SCHEMA accounting TO otelu;

    -- Accounting Service: create tables
    CREATE TABLE accounting."order" (
        order_id TEXT PRIMARY KEY
    );

    CREATE TABLE accounting.shipping (
        shipping_tracking_id TEXT PRIMARY KEY,
        shipping_cost_currency_code TEXT NOT NULL,
        shipping_cost_units BIGINT NOT NULL,
        shipping_cost_nanos INT NOT NULL,
        street_address TEXT,
        city TEXT,
        state TEXT,
        country TEXT,
        zip_code TEXT,
        order_id TEXT NOT NULL,
        FOREIGN KEY (order_id) REFERENCES accounting."order"(order_id) ON DELETE CASCADE
    );

    CREATE TABLE accounting.orderitem (
        item_cost_currency_code TEXT NOT NULL,
        item_cost_units BIGINT NOT NULL,
        item_cost_nanos INT NOT NULL,
        product_id TEXT NOT NULL,
        quantity INT NOT NULL,
        order_id TEXT NOT NULL,
        PRIMARY KEY (order_id, product_id),
        FOREIGN KEY (order_id) REFERENCES accounting."order"(order_id) ON DELETE CASCADE
    );

    -- Accounting Service: grant permission to schema
    GRANT SELECT, INSERT, UPDATE ON ALL TABLES IN SCHEMA accounting TO otelu;

    -- Product Review Service: create a schema
    CREATE SCHEMA reviews;
    GRANT USAGE ON SCHEMA reviews TO otelu;

    -- Product Review Service: create tables
    CREATE TABLE reviews.productreviews (
        id INTEGER GENERATED BY DEFAULT AS IDENTITY PRIMARY KEY,
        product_id VARCHAR(16) NOT NULL,
        username VARCHAR(64) NOT NULL,
        description VARCHAR(1024),
        score NUMERIC(2,1) NOT NULL
    );

    -- Product Review Service: create index for product_id lookups
    CREATE INDEX product_id_index ON reviews.productreviews (product_id);

    -- Product Review Service: grant permission to schema
    GRANT SELECT, INSERT, UPDATE ON ALL TABLES IN SCHEMA reviews TO otelu;

    -- Product Review Service:  add product review data
    INSERT INTO reviews.productreviews (product_id, username, description, score)
    VALUES
        ('OLJCESPC7Z', 'stargazer_mike', 'Skvělý vstupní dalekohled! Snadno se nastavuje a poskytuje jasné pohledy na měsíc a jasnější planety. Vysoce doporučuji pro nové astronomy.', '4.5'),
        ('OLJCESPC7Z', 'nightskylover', 'Za tuto cenu poskytuje Explorascope vynikající výkon. Dokázal jsem jasně vidět měsíce Jupitera. Fantastický nákup pro příležitostné pozorování.', '4.0'),
        ('OLJCESPC7Z', 'beginner_astro', 'Chvíli trvá, než si zvyknete na manuální ovládání, ale jakmile to zvládnete, je to velmi obohacující. Poprvé jsem viděl mlhovinu v Orionu! Dobrá hodnota.', '3.5'),
        ('OLJCESPC7Z', 'celestial_explorer', 'Ideální pro kempování. Je lehký a přenosný, takže ho snadno vezmete kamkoli. Pohledy jsou překvapivě dobré vzhledem k jeho velikosti.', '4.0'),
        ('OLJCESPC7Z', 'telescope_fan', 'Není to nejvýkonnější dalekohled, ale je skvělý pro děti a začátečníky. Moje děti milují pohled na měsíc s ním. Solidní volba pro rodinnou zábavu.', '3.0'),

        ('66VCHSJNUP', 'tech_astro', 'Aplikace StarSense je revoluční! Hledání nebeských objektů je neuvěřitelně snadné. Tento dalekohled je převratný pro začátečníky.', '5.0'),
        ('66VCHSJNUP', 'app_user', 'Úžasná technologie, integrace smartphonu funguje bezchybně. Nikdy jsem si tolik neužil zkoumání noční oblohy. Stojí za každou korunu.', '4.5'),
        ('66VCHSJNUP', 'innovator_john', 'Nastavení bylo hračka a návody v aplikaci jsou velmi užitečné. Pohledy jsou ostré a jasné. Moje jediná drobná výtka je vybíjení baterie telefonu.', '4.0'),
        ('66VCHSJNUP', 'clear_skies', 'Konečně dalekohled, který odstraňuje hádání z pozorování hvězd. Polohování v reálném čase je neuvěřitelně přesné. Vysoce doporučeno pro kohokoli nového v astronomii.', '5.0'),
        ('66VCHSJNUP', 'gadget_geek', 'Fantastický produkt, aplikace vás skutečně vede. Je to jako mít u sebe osobního astronoma. Optická kvalita je také velmi dobrá.', '4.5'),

        ('1YMWWN1N4O', 'solar_viewer', 'Ideální pro sluneční pozorování! Filtr Solar Safe dává klid na duši. Použil jsem ho při posledním částečném zatmění a bylo to fantastické.', '5.0'),
        ('1YMWWN1N4O', 'eclipse_chaser', 'Kompaktní a snadno přenosný, tento dalekohled je ideální pro zatmění. Přiložený batoh je příjemný detail. Pohledy na slunce jsou neuvěřitelně jasné a bezpečné.', '4.5'),
        ('1YMWWN1N4O', 'travel_astro', 'Vynikající cestovní dalekohled pro pozorování slunce. Zvětšení je mnohem lepší než u triedrů pro slunce. Nutnost pro každého slunečního nadšence.', '4.0'),
        ('1YMWWN1N4O', 'sun_gazer', 'Velmi ohromen bezpečnostními funkcemi a jasností. Sdílení slunce s rodinou nebylo nikdy snazší nebo bezpečnější. Skvělá hodnota pro specializovaný sluneční dalekohled.', '5.0'),
        ('1YMWWN1N4O', 'safe_viewer', 'Filtr vyhovující normě ISO je uklidňující. Je to dobře navržený produkt pro bezpečné pozorování slunce. Vysoce doporučuji i pro vzdělávací účely.', '4.5'),

        ('L9ECAV7KIM', 'clean_optics', 'Tato sada je zachránce pro všechnu mou optiku. Kartáč a ubrousky fungují perfektně bez zanechání stop. Moje čočky nikdy nebyly čistší.', '5.0'),
        ('L9ECAV7KIM', 'photog_pro', 'Nezbytnost pro každého fotografa nebo vlastníka dalekohledu. Bezpečně odstraňuje prach a otisky prstů. Vysoce kvalitní čisticí roztok.', '4.5'),
        ('L9ECAV7KIM', 'daily_cleaner', 'Používám to na své triedry, objektivy fotoaparátu a dokonce i na obrazovku telefonu. Je to velmi účinné a šetrné. Všestranná čisticí sada.', '4.0'),
        ('L9ECAV7KIM', 'tech_maintenance', 'Skvělý poměr cena/výkon. Různé čisticí možnosti pokrývají všechny potřeby. Udržuje mé drahé vybavení v perfektním stavu.', '5.0'),
        ('L9ECAV7KIM', 'sharp_view', 'Funguje jak inzerováno, pohledy mým dalekohledem jsou po použití mnohem jasnější. Tekutina a hadřík jsou vynikající. Rozhodně doporučuji.', '4.5'),

        ('2ZYFJ3GM2N', 'bird_watcher', 'Neuvěřitelná jasnost a jas, ideální pro pozorování ptáků. ED sklo opravdu dělá rozdíl. Dokážu rozpoznat i ty nejjemnější znaky.', '5.0'),
        ('2ZYFJ3GM2N', 'nature_lover', 'Tyto triedry jsou fantastické pro pozorování přírody. Krátké ostření je obrovská výhoda pro sledování blízké divoké zvěře. Velmi pohodlné na držení.', '4.5'),
        ('2ZYFJ3GM2N', 'hiker_guy', 'Lehké a odolné, toto jsou mé oblíbené triedry na turistiku. Široké zorné pole je vynikající. Vysoce doporučuji pro outdoorové nadšence.', '4.0'),
        ('2ZYFJ3GM2N', 'stadium_fan', 'Vzal jsem je na zápas a měl jsem úžasný výhled na akci. Fungují skvěle v různých světelných podmínkách. Solidní všestranný triedr.', '4.0'),
        ('2ZYFJ3GM2N', 'outdoor_adventurer', 'Vynikající kvalita provedení a optický výkon. Působí robustně a poskytují ostré obrazy. Skvělá investice pro jakoukoli outdoorovou aktivitu.', '4.5'),

        ('0PUK6V6EV0', 'astro_photog', 'Tento zobrazovač je fantastický krok vpřed pro planetární fotografii. Kvalita barev je vynikající. Snadno se používá s mým stávajícím dalekohledem.', '5.0'),
        ('0PUK6V6EV0', 'planet_shooter', 'Konečně zachycuji úžasné snímky Saturnu a Jupiteru! NexImage 10 to dělá tak dostupným. Skvělé pro začátečníky v astrofotografii.', '4.5'),
        ('0PUK6V6EV0', 'imager_pro', 'Vynikající rozlišení a podání barev za svou cenovou hladinu. Je to perfektní řešení pro ty, kteří chtějí začít zobrazovat planety. Vysoce spokojen.', '4.0'),
        ('0PUK6V6EV0', 'space_artist', 'Detaily, které dokážu zachytit tímto zobrazovačem, jsou neuvěřitelné. Dobře se integruje s různým softwarem. Nutnost pro seriózní planetární pozorovatele.', '5.0'),
        ('0PUK6V6EV0', 'digital_sky', 'Solidní volba pro vstup do zobrazování sluneční soustavy. Nastavení bylo jednoduché. Produkuje krásné, živé planetární snímky.', '4.5'),

        ('LS4PSXUNUM', 'night_walker', 'Červené světlo je ideální pro zachování nočního vidění během astronomických sezení. Ohřívač rukou je neočekávaný bonus. Velmi praktické zařízení.', '5.0'),
        ('LS4PSXUNUM', 'star_party_goer', 'Tato svítilna je nepostradatelná pro hvězdné párty. Červený režim je jemný k očím a funkce powerbanky je super praktická. Miluji ji!', '4.5'),
        ('LS4PSXUNUM', 'camper_chris', 'Odolná a všestranná, tato svítilna je skvělá pro kempování a noční procházky. Funkce ohřívače rukou je převratná v chladných nocích. Vysoce doporučuji.', '4.5'),
        ('LS4PSXUNUM', 'emergency_kit', 'Fantastický multifunkční nástroj pro mou nouzovou sadu. Červené světlo je užitečné a powerbanka znamená, že mohu nabít telefon. Skvělý design.', '4.0'),
        ('LS4PSXUNUM', 'astro_accessory', 'Každý astronom potřebuje jeden z nich. Červené světlo je nezbytné a ohřívač rukou a powerbanka ho dělají neuvěřitelně užitečným. Špičkové příslušenství.', '5.0'),

        ('9SIQT8TOJO', 'deep_sky_master', 'RASA V2 je splněný sen pro hluboké zobrazování oblohy. Rychlost f/2.2 dramaticky zkracuje expoziční časy. Moje nejlepší investice do astrofotografie.', '5.0'),
        ('9SIQT8TOJO', 'pro_astro', 'Neuvěřitelný výkon pro širokoúhlou astrofotografii. Krátká ohnisková vzdálenost činí navádění méně kritickým. Produkuje úžasné, detailní snímky.', '5.0'),
        ('9SIQT8TOJO', 'imaging_guru', 'Tento OTA je bestie! Rychlá optika znamená více dat za kratší čas. Pokud to s hlubokým zobrazováním myslíte vážně, toto je ono.', '4.5'),
        ('9SIQT8TOJO', 'advanced_scope', 'Stojí za každou korunu za kvalitu a rychlost, kterou nabízí. Moje snímky nikdy nebyly ostřejší nebo živější. Opravdu profesionální kus vybavení.', '5.0'),
        ('9SIQT8TOJO', 'precision_optics', 'Inženýrství za touto RASA je výjimečné. Je neuvěřitelně efektivní pro zachycení slabých objektů. Vysoce kvalitní volba pro oddané zobrazovače.', '4.5'),

        ('6E92ZMYYFZ', 'solar_safety', 'Nezbytné pro bezpečné pozorování slunce s mým 8palcovým dalekohledem. Suché zipy zajišťují, že zůstane bezpečně na místě. Klid na duši během slunečních pozorování.', '5.0'),
        ('6E92ZMYYFZ', 'telescope_upgrade', 'Tento filtr EclipSmart je perfektním doplňkem mé sestavy. Soulad s ISO je klíčový. Vysoce doporučuji pro každého, kdo chce bezpečně pozorovat slunce.', '4.5'),
        ('6E92ZMYYFZ', 'safe_sun_gazer', 'Snadno se připevňuje a poskytuje křišťálově jasné, bezpečné pohledy na slunce. Kvalita provedení je vynikající. Nutné příslušenství pro sluneční nadšence.', '5.0'),
        ('6E92ZMYYFZ', 'filter_fan', 'Funguje perfektně s mým 8palcovým dalekohledem. Už žádné obavy z náhodného uvolnění. Skvělý produkt pro ochranu vašich očí a vybavení.', '4.5'),
        ('6E92ZMYYFZ', 'eclipse_ready', 'Koupil jsem to pro nadcházející zatmění a perfektně to sedí. Vyzkoušel jsem to a pohledy jsou fantastické a bezpečné. S tímto nákupem jsem velmi spokojen.', '5.0'),

        ('HQTGWGPNH4', 'history_buff', 'Fascinující pohled do historického astronomického myšlení. Obsah je neuvěřitelně vhledný. Povinné čtení pro každého, kdo se zajímá o historii vědy.', '5.0'),
        ('HQTGWGPNH4', 'bookworm_astro', 'Krásně prezentovaný historický dokument. Je úžasné vidět, jak byly komety chápány před staletími. Cenný doplněk každé astronomické knihovny.', '4.5'),
        ('HQTGWGPNH4', 'ancient_texts', 'Tak unikátní a strhující čtení. Historický kontext je podmanivý. Nabízí jiný pohled na nebeské události.', '4.0'),
        ('HQTGWGPNH4', 'celestial_history', 'Miluji historickou astronomii a tato kniha dodává. Je dobře prozkoumaná a poskytuje okno do minulých přesvědčení. Vysoce doporučeno pro učence.', '5.0'),
        ('HQTGWGPNH4', 'rare_find', 'Opravdu speciální kniha pro nadšence astronomické historie. Detaily o starověkých astrology jsou velmi zajímavé. Skvělé pro hlubší porozumění.', '4.5');

    -- Product Catalog Service: create a schema
    CREATE SCHEMA catalog;
    GRANT USAGE ON SCHEMA catalog TO otelu;

    -- Product Catalog Service: create tables
    CREATE TABLE catalog.products (
        id TEXT PRIMARY KEY,
        name TEXT NOT NULL,
        description TEXT,
        picture TEXT,
        price_currency_code TEXT NOT NULL,
        price_units BIGINT NOT NULL,
        price_nanos INT NOT NULL,
        categories TEXT
    );

    -- Product Catalog Service: grant permission to schema
    GRANT SELECT ON ALL TABLES IN SCHEMA catalog TO otelu;

    -- Product Catalog Service: add product data
    INSERT INTO catalog.products (id, name, description, picture, price_currency_code, price_units, price_nanos, categories)
    VALUES
        ('OLJCESPC7Z', 'National Park Foundation Explorascope', 'Explorascope 60AZ od National Park Foundation (NPF) je manuální alt-azimutální refraktorový dalekohled, ideální pro astronomická pozorování na cestách. NPF Explorascope 60 dokáže pozorovat planety, měsíc, hvězdokupy a jasnější objekty hlubokého vesmíru, jako je mlhovina v Orionu a galaxie v Andromedě.', 'NationalParkFoundationExplorascope.jpg', 'CZK', 2400, 0, 'telescopes'),
        ('66VCHSJNUP', 'Starsense Explorer Refractor Telescope', 'První dalekohled, který pomocí vašeho smartphonu analyzuje noční oblohu a vypočítává svou polohu v reálném čase. StarSense Explorer je ideální pro začátečníky díky uživatelsky přívětivému rozhraní aplikace a podrobným tutoriálům. Je to jako mít u sebe svého osobního průvodce noční oblohou.', 'StarsenseExplorer.jpg', 'CZK', 8500, 0, 'telescopes'),
        ('1YMWWN1N4O', 'Eclipsmart Travel Refractor Telescope', 'Specializovaný sluneční dalekohled na bílé světlo pro pozorovatele na cestách. 50mm refrakční sluneční dalekohled používá filtrační materiál Solar Safe, vyhovující normě ISO, s plnou aperturou pro zajištění nejbezpečnějšího pohledu na sluneční události. Sada obsahuje vše, co potřebujete, včetně specializovaného cestovního slunečního dalekohledu, hledáčku Solar Safe, stativu, vysoce kvalitního 20mm (18x) Kellnerova okuláru a nylonového batohu pro přenášení všeho. Tento cestovní sluneční dalekohled usnadňuje sdílení Slunce i částečných a úplných slunečních zatmění s celou rodinou a nabízí mnohem vyšší zvětšení, než jaké byste získali pomocí ručních slunečních pozorovatelů nebo triedrů.', 'EclipsmartTravelRefractorTelescope.jpg', 'CZK', 3100, 0, 'telescopes,travel'),
        ('L9ECAV7KIM', 'Sada na čištění čoček', 'Otřete prach, nečistoty, otisky prstů a další částice ze svých čoček, abyste jasně viděli pomocí sady na čištění čoček. Tato čisticí sada funguje na všech skleněných a optických površích, včetně dalekohledů, triedrů, pozorovacích dalekohledů, monokulárů, mikroskopů a dokonce i objektivů fotoaparátů, obrazovek počítačů a mobilních zařízení. Sada obsahuje vysouvací kartáč na čočky pro odstranění prachových částic a nečistot a dvě možnosti čištění šmouh a otisků prstů z optiky: předem navlhčené ubrousky na čočky a lahvičku čisticí kapaliny na čočky s měkkým hadříkem.', 'LensCleaningKit.jpg', 'CZK', 510, 0, 'accessories'),
        ('2ZYFJ3GM2N', 'Střešní triedr', 'Tento všestranný triedr je skvělou volbou pro stezku, stadion, arénu nebo téměř kdekoli, kde chcete mít detailní pohled na akci bez ztráty jasu nebo detailů. Je to obzvláště skvělý společník pro pozorování přírody a ptáků, s ED sklem, které vám pomůže spatřit ty nejjemnější terénní znaky, a zaostřením na blízko pouhých 6,5 stop.', 'RoofBinoculars.jpg', 'CZK', 5000, 0, 'binoculars'),
        ('0PUK6V6EV0', 'Barevný zobrazovač sluneční soustavy', 'Máte svůj nový dalekohled a pozorovali jste Saturn a Jupiter. Nyní jste připraveni udělat další krok a začít je zobrazovat. Ale kde začít? NexImage 10 Solar System Imager je perfektní řešení.', 'SolarSystemColorImager.jpg', 'CZK', 4200, 0, 'accessories,telescopes'),
        ('LS4PSXUNUM', 'Červená svítilna', 'Toto zařízení 3 v 1 nabízí 3režimovou červenou svítilnu, ohřívač rukou a přenosnou powerbanku pro dobíjení vaší osobní elektroniky na cestách. Ať už ji používáte k osvětlení cesty na astronomické hvězdné párty, noční procházce nebo při výzkumu divoké zvěře, robustní design ThermoTorch 3 Astro Red s krytím IPX4 vydrží vaše každodenní aktivity.', 'RedFlashlight.jpg', 'CZK', 1400, 0, 'accessories,flashlights'),
        ('9SIQT8TOJO', 'Sestava optického tubusu', 'Zachycování působivých hlubokých nebeských astrofotografií je s Rowe-Ackermann Schmidt Astrograph (RASA) V2 jednodušší než kdy dříve, je to dokonalý společník pro dnešní špičkové DSLR nebo astronomické CCD kamery. Tento rychlý širokoúhlý systém f/2.2 umožňuje kratší expoziční časy ve srovnání s tradičním astrofotografováním f/10, bez obětování rozlišení. Protože jsou možné kratší doby sub-expozice, vaše paralaktická montáž nebude muset přesně sledovat po delší dobu. Krátká ohnisková vzdálenost také snižuje nároky na paralaktické sledování. V mnoha případech nebude autostopping vyžadován.', 'OpticalTubeAssembly.jpg', 'CZK', 88000, 0, 'accessories,telescopes,assembly'),
        ('6E92ZMYYFZ', 'Sluneční filtr', 'Vylepšete svůj zážitek ze sledování slunečním filtrem EclipSmart pro 8" dalekohledy. Se dvěma suchými zipy a čtyřmi samolepicími suchými zipy pro větší bezpečnost si můžete být jisti, že sluneční filtr nelze náhodně sejmout a poskytne bezpečné pozorování vyhovující Solar Safe a ISO.', 'SolarFilter.jpg', 'CZK', 1700, 0, 'accessories,telescopes'),
        ('HQTGWGPNH4', 'Kniha o kometách', 'Pojednání o kometách ze 16. století, anonymně vytvořené ve Flandrech (dnešní severní Francie) a nyní uložené v Univerzitní knihovně v Kasselu. Běžně známé jako Kniha o kometách (nebo Kometenbuch v němčině), jeho úplný název se překládá jako "Komety a jejich obecné a zvláštní významy, podle Ptolemaia, Albumasara, Halyho, Aliquinda a dalších astrologů". Obrázek je z https://publicdomainreview.org/collection/the-comet-book, poskytnutý Univerzitní knihovnou v Kasselu pod licencí CC-BY SA 4.0 (https://creativecommons.org/licenses/by-sa/4.0/).', 'TheCometBook.jpg', 'CZK', 0, 0, 'books');
