# Source: opentelemetry-demo/templates/posgresql-init-config.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: astronomy-postgresql-init
  labels:
    helm.sh/chart: opentelemetry-demo-0.40.9
    app.kubernetes.io/version: 2.2.0
    app.kubernetes.io/part-of: opentelemetry-demo
    app.kubernetes.io/managed-by: Helm
  namespace: otel-demo
data:
  init.sql: |
    -- Copyright The OpenTelemetry Authors
    -- SPDX-License-Identifier: Apache-2.0

    CREATE USER otelu WITH PASSWORD 'otelp';

    -- Accounting Service: create a schema
    CREATE SCHEMA accounting;
    GRANT USAGE ON SCHEMA accounting TO otelu;

    -- Accounting Service: create tables
    CREATE TABLE accounting."order" (
        order_id TEXT PRIMARY KEY
    );

    CREATE TABLE accounting.shipping (
        shipping_tracking_id TEXT PRIMARY KEY,
        shipping_cost_currency_code TEXT NOT NULL,
        shipping_cost_units BIGINT NOT NULL,
        shipping_cost_nanos INT NOT NULL,
        street_address TEXT,
        city TEXT,
        state TEXT,
        country TEXT,
        zip_code TEXT,
        order_id TEXT NOT NULL,
        FOREIGN KEY (order_id) REFERENCES accounting."order"(order_id) ON DELETE CASCADE
    );

    CREATE TABLE accounting.orderitem (
        item_cost_currency_code TEXT NOT NULL,
        item_cost_units BIGINT NOT NULL,
        item_cost_nanos INT NOT NULL,
        product_id TEXT NOT NULL,
        quantity INT NOT NULL,
        order_id TEXT NOT NULL,
        PRIMARY KEY (order_id, product_id),
        FOREIGN KEY (order_id) REFERENCES accounting."order"(order_id) ON DELETE CASCADE
    );

    -- Accounting Service: grant permission to schema
    GRANT SELECT, INSERT, UPDATE ON ALL TABLES IN SCHEMA accounting TO otelu;

    -- Product Review Service: create a schema
    CREATE SCHEMA reviews;
    GRANT USAGE ON SCHEMA reviews TO otelu;

    -- Product Review Service: create tables
    CREATE TABLE reviews.productreviews (
        id INTEGER GENERATED BY DEFAULT AS IDENTITY PRIMARY KEY,
        product_id VARCHAR(16) NOT NULL,
        username VARCHAR(64) NOT NULL,
        description VARCHAR(1024),
        score NUMERIC(2,1) NOT NULL
    );

    -- Product Review Service: create index for product_id lookups
    CREATE INDEX product_id_index ON reviews.productreviews (product_id);

    -- Product Review Service: grant permission to schema
    GRANT SELECT, INSERT, UPDATE ON ALL TABLES IN SCHEMA reviews TO otelu;

    -- Product Review Service:  add product review data
    INSERT INTO reviews.productreviews (product_id, username, description, score)
    VALUES
        ('OLJCESPC7Z', 'stargazer_mike', '出色的入门级望远镜！易于安装，能清晰地观察月亮和较亮的行星。强烈推荐给刚入门的观星爱好者。', '4.5'),
        ('OLJCESPC7Z', 'nightskylover', '以这个价格，这款Explorascope提供了出色的性能。我能够清晰地看到木星的卫星。对于休闲观星来说是非常棒的购买。', '4.0'),
        ('OLJCESPC7Z', 'beginner_astro', '手动控制需要一点时间适应，但一旦掌握就非常有收获。第一次看到了猎户座星云！物有所值。', '3.5'),
        ('OLJCESPC7Z', 'celestial_explorer', '非常适合露营旅行。它轻巧便携，易于带到任何地方。以其尺寸来说视野出奇地好。', '4.0'),
        ('OLJCESPC7Z', 'telescope_fan', '不是最强大的望远镜，但对儿童和初学者来说很棒。我的孩子们喜欢用它看月亮。是家庭娱乐的可靠选择。', '3.0'),

        ('66VCHSJNUP', 'tech_astro', 'StarSense应用程序是革命性的！它使寻找天体变得异常容易。对于初学者来说，这款望远镜是改变游戏规则的存在。', '5.0'),
        ('66VCHSJNUP', 'app_user', '惊人的技术，智能手机集成完美运行。我从来没有这么享受过探索夜空的过程。物超所值。', '4.5'),
        ('66VCHSJNUP', 'innovator_john', '安装非常简便，应用程序中的教程也很有帮助。视野清晰锐利。我唯一的小小不满是手机耗电。', '4.0'),
        ('66VCHSJNUP', 'clear_skies', '终于，有一款望远镜可以消除观星的猜测。实时定位极其准确。强烈推荐给任何天文学新手。', '5.0'),
        ('66VCHSJNUP', 'gadget_geek', '优秀的产品，应用程序真正能够引导你。就像身边有一位私人天文学家。光学质量也非常好。', '4.5'),

        ('1YMWWN1N4O', 'solar_viewer', '非常适合太阳观测！Solar Safe滤镜让人安心。我在上次偏食时使用了它，效果惊人。', '5.0'),
        ('1YMWWN1N4O', 'eclipse_chaser', '紧凑且便于携带，这款望远镜非常适合日食活动。附带的背包是一个贴心的设计。太阳的视野异常清晰和安全。', '4.5'),
        ('1YMWWN1N4O', 'travel_astro', '太阳观测的优秀旅行望远镜。其放大倍数远优于双筒望远镜用于观察太阳。是任何太阳爱好者的必备品。', '4.0'),
        ('1YMWWN1N4O', 'sun_gazer', '对其安全功能和清晰度印象深刻。与家人分享太阳从未如此简单或安全。作为专用太阳望远镜，性价比很高。', '5.0'),
        ('1YMWWN1N4O', 'safe_viewer', '符合ISO标准的滤镜让人放心。这是一款设计精良的产品，用于安全的太阳观测。也强烈推荐用于教育目的。', '4.5'),

        ('L9ECAV7KIM', 'clean_optics', '这套工具包对我所有的光学设备来说都是救星。刷子和擦拭布完美工作，不留任何残留物。我的镜头从未如此干净。', '5.0'),
        ('L9ECAV7KIM', 'photog_pro', '任何摄影师或望远镜拥有者的必备品。它能安全地去除灰尘和指纹。高品质的清洁溶液。', '4.5'),
        ('L9ECAV7KIM', 'daily_cleaner', '我把它用在我的双筒望远镜、相机镜头，甚至手机屏幕上。它非常有效且温和。多功能的清洁套件。', '4.0'),
        ('L9ECAV7KIM', 'tech_maintenance', '物超所值。不同的清洁选项满足所有需求。让我的昂贵设备保持完美状态。', '5.0'),
        ('L9ECAV7KIM', 'sharp_view', '如宣传所言，使用后我的望远镜视野清晰得多。液体和布都很出色。强烈推荐。', '4.5'),

        ('2ZYFJ3GM2N', 'bird_watcher', '难以置信的清晰度和亮度，非常适合观鸟。ED玻璃确实有区别。我能辨认出最细微的标记。', '5.0'),
        ('2ZYFJ3GM2N', 'nature_lover', '这款双筒望远镜非常适合自然观察。短焦距对于观察附近的野生动物是一个巨大的优势。握持也非常舒适。', '4.5'),
        ('2ZYFJ3GM2N', 'hiker_guy', '轻巧耐用，这些是我徒步旅行的首选双筒望远镜。视野宽阔。强烈推荐给户外爱好者。', '4.0'),
        ('2ZYFJ3GM2N', 'stadium_fan', '带去看比赛，视野非常棒。它们在各种光照条件下都表现出色。是可靠的通用型双筒望远镜。', '4.0'),
        ('2ZYFJ3GM2N', 'outdoor_adventurer', '卓越的制造质量和光学性能。它们感觉坚固耐用，提供清晰的图像。对于任何户外活动来说都是一项伟大的投资。', '4.5'),

        ('0PUK6V6EV0', 'astro_photog', '这款成像仪是行星摄影的精彩升级。色彩质量出色。易于与我现有的望远镜设置配合使用。', '5.0'),
        ('0PUK6V6EV0', 'planet_shooter', '终于能够捕捉到土星和木星的惊艳图像了！NexImage 10让它变得如此容易接触。对于天体摄影初学者来说很棒。', '4.5'),
        ('0PUK6V6EV0', 'imager_pro', '对于其价位而言，分辨率和色彩还原都非常出色。对于那些想要开始行星成像的人来说，这是一个完美的解决方案。非常满意。', '4.0'),
        ('0PUK6V6EV0', 'space_artist', '用这款成像仪能捕捉到的细节令人难以置信。它与各种软件集成良好。对于严肃的行星观测者是必备品。', '5.0'),
        ('0PUK6V6EV0', 'digital_sky', '进入太阳系成像的可靠选择。安装简单。产生美丽、生动的行星图像。', '4.5'),

        ('LS4PSXUNUM', 'night_walker', '红光非常适合在天文观测期间保护夜视功能。暖手器是一个意外的加分项。非常实用的设备。', '5.0'),
        ('LS4PSXUNUM', 'star_party_goer', '这款手电筒对于观星聚会来说是不可或缺的。红色模式对眼睛柔和，充电宝功能非常方便。太爱了！', '4.5'),
        ('LS4PSXUNUM', 'camper_chris', '坚固耐用，这款手电筒非常适合露营和夜间散步。暖手器功能在寒冷的夜晚是改变游戏规则的存在。强烈推荐。', '4.5'),
        ('LS4PSXUNUM', 'emergency_kit', '我应急工具包中的精彩多功能工具。红灯很有用，充电宝意味着我可以给手机充电。设计很棒。', '4.0'),
        ('LS4PSXUNUM', 'astro_accessory', '每位天文学爱好者都需要一个。红灯必不可少，暖手器和充电宝让它变得难以置信地实用。顶级的配件。', '5.0'),

        ('9SIQT8TOJO', 'deep_sky_master', 'RASA V2是深空成像梦想成真的产品。f/2.2的速度大大缩短了曝光时间。我迄今为止最棒的天体摄影投资。', '5.0'),
        ('9SIQT8TOJO', 'pro_astro', '广角天体摄影难以置信的性能。短焦距使得导星变得不那么关键。产生惊艳、详细的图像。', '5.0'),
        ('9SIQT8TOJO', 'imaging_guru', '这款OTA是野兽！快速光学意味着更短的时间内获得更多数据。如果您认真对待深空成像，这就是答案。', '4.5'),
        ('9SIQT8TOJO', 'advanced_scope', '对于它提供的质量和速度来说，每一分钱都值得。我的图像从未如此锐利或生动。真正的专业级设备。', '5.0'),
        ('9SIQT8TOJO', 'precision_optics', '这款RASA背后的工程设计非常出色。它在捕捉暗弱天体方面效率极高。对于专注的成像者来说是高端选择。', '4.5'),

        ('6E92ZMYYFZ', 'solar_safety', '对于我8英寸望远镜的安全太阳观测来说是必需的。魔术贴绑带确保它牢牢固定到位。太阳观测期间的安心感。', '5.0'),
        ('6E92ZMYYFZ', 'telescope_upgrade', '这款EclipSmart滤镜是我装备的完美补充。ISO合规性至关重要。强烈推荐给任何希望安全观测太阳的人。', '4.5'),
        ('6E92ZMYYFZ', 'safe_sun_gazer', '易于安装，提供太阳的清晰安全视野。制造质量出色。太阳爱好者必备的配件。', '5.0'),
        ('6E92ZMYYFZ', 'filter_fan', '完美适配我的8英寸望远镜。无需担心意外脱落。保护您眼睛和设备的优秀产品。', '4.5'),
        ('6E92ZMYYFZ', 'eclipse_ready', '为即将到来的日食购买，完美契合。测试了一下，视野惊艳且安全。对这次购买非常满意。', '5.0'),

        ('HQTGWGPNH4', 'history_buff', '对历史天文学思想的一次迷人窥视。内容极具洞察力。对任何对科学史感兴趣的人来说是必读之作。', '5.0'),
        ('HQTGWGPNH4', 'bookworm_astro', '精美呈现的历史文献。看到几个世纪前人们如何理解彗星令人惊叹。任何天文学图书馆的有价值补充。', '4.5'),
        ('HQTGWGPNH4', 'ancient_texts', '如此独特而引人入胜的读物。历史背景引人入胜。它提供了对天体事件的不同视角。', '4.0'),
        ('HQTGWGPNH4', 'celestial_history', '我喜欢历史天文学，这本书交足了功课。它研究充分，为过去的信仰提供了一个窗口。强烈推荐给学者。', '5.0'),
        ('HQTGWGPNH4', 'rare_find', '对于天文学历史爱好者来说真正特别的书。关于古代占星家的细节非常有趣。非常适合深入理解。', '4.5');

    -- Product Catalog Service: create a schema
    CREATE SCHEMA catalog;
    GRANT USAGE ON SCHEMA catalog TO otelu;

    -- Product Catalog Service: create tables
    CREATE TABLE catalog.products (
        id TEXT PRIMARY KEY,
        name TEXT NOT NULL,
        description TEXT,
        picture TEXT,
        price_currency_code TEXT NOT NULL,
        price_units BIGINT NOT NULL,
        price_nanos INT NOT NULL,
        categories TEXT
    );

    -- Product Catalog Service: grant permission to schema
    GRANT SELECT ON ALL TABLES IN SCHEMA catalog TO otelu;

    -- Product Catalog Service: add product data
    INSERT INTO catalog.products (id, name, description, picture, price_currency_code, price_units, price_nanos, categories)
    VALUES
        ('OLJCESPC7Z', '国家公园基金会探索者望远镜', '国家公园基金会(NPF)的探索者望远镜60AZ是一款手动经纬仪折射望远镜，非常适合外出时的天文观测。NPF探索者望远镜60可以观测行星、月亮、星团以及像猎户座大星云和仙女座星系这样较亮的深空天体。', 'NationalParkFoundationExplorascope.jpg', 'CNY', 720, 0, 'telescopes'),
        ('66VCHSJNUP', '星感探索者折射望远镜', '第一款使用您的智能手机分析夜空并实时计算其位置的望远镜。由于其用户友好的应用程序界面和详细的教程，星感探索者是初学者的理想选择。就像拥有您自己的私人夜空导游一样。', 'StarsenseExplorer.jpg', 'CNY', 2500, 0, 'telescopes'),
        ('1YMWWN1N4O', '日食智能旅行折射望远镜', '为外出观察者提供的专用白光太阳望远镜。50毫米折射太阳望远镜使用Solar Safe、符合ISO标准的全口径玻璃滤镜材料，确保最安全的太阳事件观测。套件配备您需要的一切，包括专用旅行太阳望远镜、Solar Safe寻星镜、三脚架、高品质20毫米(18倍)凯尔纳目镜和用于携带所有物品的尼龙背包。这款旅行太阳望远镜使您能够轻松地与全家分享太阳以及部分和全日食，并提供比手持太阳观察器或双筒望远镜更高的放大倍数。', 'EclipsmartTravelRefractorTelescope.jpg', 'CNY', 920, 0, 'telescopes,travel'),
        ('L9ECAV7KIM', '镜头清洁套装', '使用镜头清洁套装擦去您镜头上的灰尘、污垢、指纹和其他颗粒，使您能够清晰地观看。该清洁套件适用于所有玻璃和光学表面，包括望远镜、双筒望远镜、观鸟镜、单筒望远镜、显微镜，甚至您的相机镜头、电脑屏幕和移动设备。套件配备可伸缩镜头刷以去除灰尘颗粒和污垢，以及两种清洁光学器件污渍和指纹的选项：预湿镜头湿巾和带软布的瓶装镜头清洁液。', 'LensCleaningKit.jpg', 'CNY', 150, 0, 'accessories'),
        ('2ZYFJ3GM2N', '屋脊棱镜双筒望远镜', '这款多功能的全能双筒望远镜是您在小径、体育场、竞技场或几乎任何想要近距离观察动作而不牺牲亮度或细节的地方的绝佳选择。它是自然观察和观鸟的特别好的伙伴，ED玻璃可帮助您发现最细微的野外标记，最近对焦距离仅为6.5英尺。', 'RoofBinoculars.jpg', 'CNY', 1500, 0, 'binoculars'),
        ('0PUK6V6EV0', '太阳系彩色成像仪', '您拥有了新望远镜并已经观测了土星和木星。现在您准备好迈出下一步，开始对它们进行成像。但是从哪里开始呢？NexImage 10太阳系成像仪是完美的解决方案。', 'SolarSystemColorImager.jpg', 'CNY', 1260, 0, 'accessories,telescopes'),
        ('LS4PSXUNUM', '红色手电筒', '这款三合一设备具有三模式红色手电筒、暖手器以及便携式充电宝，可在外出时为您的个人电子设备充电。无论您是在天文观星聚会、夜间散步或野生动物研究中用它来照亮道路，ThermoTorch 3 Astro Red的坚固、IPX4级设计都能承受您的日常活动。', 'RedFlashlight.jpg', 'CNY', 410, 0, 'accessories,flashlights'),
        ('9SIQT8TOJO', '光学镜筒组件', '使用Rowe-Ackermann Schmidt天体照相仪(RASA) V2捕捉令人印象深刻的深空天体图像比以往任何时候都更容易，它是当今顶级单反相机或天文CCD相机的完美伴侣。这款快速、宽视场f/2.2系统允许比传统的f/10天体成像更短的曝光时间，同时不牺牲分辨率。由于可以使用较短的子曝光时间，您的赤道仪不需要在长时间内进行精确跟踪。短焦距也减轻了赤道跟踪的需求。在许多情况下，不需要自动导星。', 'OpticalTubeAssembly.jpg', 'CNY', 25900, 0, 'accessories,telescopes,assembly'),
        ('6E92ZMYYFZ', '太阳滤镜', '使用8英寸望远镜的EclipSmart太阳滤镜增强您的观看体验。配备两条魔术贴绑带和四个自粘式魔术贴垫以增加安全性，您可以放心太阳滤镜不会被意外撞掉，并提供Solar Safe、符合ISO标准的观看。', 'SolarFilter.jpg', 'CNY', 495, 0, 'accessories,telescopes'),
        ('HQTGWGPNH4', '彗星之书', '一本16世纪关于彗星的论文，在弗兰德(今法国北部)匿名创作，现藏于卡塞尔大学图书馆。通常被称为彗星之书(德语为Kometenbuch)，其完整标题翻译为"根据托勒密、阿尔布马萨尔、海利、阿里奎因和其他占星家，彗星及其一般和特殊含义"。图像来自https://publicdomainreview.org/collection/the-comet-book，由卡塞尔大学图书馆根据CC-BY SA 4.0许可证(https://creativecommons.org/licenses/by-sa/4.0/)提供。', 'TheCometBook.jpg', 'CNY', 0, 0, 'books');
