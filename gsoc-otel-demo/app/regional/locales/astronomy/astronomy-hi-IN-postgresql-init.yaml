# Source: opentelemetry-demo/templates/posgresql-init-config.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: astronomy-postgresql-init
  labels:
    helm.sh/chart: opentelemetry-demo-0.40.9
    app.kubernetes.io/version: 2.2.0
    app.kubernetes.io/part-of: opentelemetry-demo
    app.kubernetes.io/managed-by: Helm
  namespace: otel-demo
data:
  init.sql: |
    -- Copyright The OpenTelemetry Authors
    -- SPDX-License-Identifier: Apache-2.0

    CREATE USER otelu WITH PASSWORD 'otelp';

    -- Accounting Service: create a schema
    CREATE SCHEMA accounting;
    GRANT USAGE ON SCHEMA accounting TO otelu;

    -- Accounting Service: create tables
    CREATE TABLE accounting."order" (
        order_id TEXT PRIMARY KEY
    );

    CREATE TABLE accounting.shipping (
        shipping_tracking_id TEXT PRIMARY KEY,
        shipping_cost_currency_code TEXT NOT NULL,
        shipping_cost_units BIGINT NOT NULL,
        shipping_cost_nanos INT NOT NULL,
        street_address TEXT,
        city TEXT,
        state TEXT,
        country TEXT,
        zip_code TEXT,
        order_id TEXT NOT NULL,
        FOREIGN KEY (order_id) REFERENCES accounting."order"(order_id) ON DELETE CASCADE
    );

    CREATE TABLE accounting.orderitem (
        item_cost_currency_code TEXT NOT NULL,
        item_cost_units BIGINT NOT NULL,
        item_cost_nanos INT NOT NULL,
        product_id TEXT NOT NULL,
        quantity INT NOT NULL,
        order_id TEXT NOT NULL,
        PRIMARY KEY (order_id, product_id),
        FOREIGN KEY (order_id) REFERENCES accounting."order"(order_id) ON DELETE CASCADE
    );

    -- Accounting Service: grant permission to schema
    GRANT SELECT, INSERT, UPDATE ON ALL TABLES IN SCHEMA accounting TO otelu;

    -- Product Review Service: create a schema
    CREATE SCHEMA reviews;
    GRANT USAGE ON SCHEMA reviews TO otelu;

    -- Product Review Service: create tables
    CREATE TABLE reviews.productreviews (
        id INTEGER GENERATED BY DEFAULT AS IDENTITY PRIMARY KEY,
        product_id VARCHAR(16) NOT NULL,
        username VARCHAR(64) NOT NULL,
        description VARCHAR(1024),
        score NUMERIC(2,1) NOT NULL
    );

    -- Product Review Service: create index for product_id lookups
    CREATE INDEX product_id_index ON reviews.productreviews (product_id);

    -- Product Review Service: grant permission to schema
    GRANT SELECT, INSERT, UPDATE ON ALL TABLES IN SCHEMA reviews TO otelu;

    -- Product Review Service:  add product review data
    INSERT INTO reviews.productreviews (product_id, username, description, score)
    VALUES
        ('OLJCESPC7Z', 'stargazer_mike', 'बढ़िया शुरुआती टेलीस्कोप! सेट करने में आसान और चंद्रमा तथा चमकीले ग्रहों के स्पष्ट दृश्य प्रदान करता है। नए खगोलविदों के लिए अत्यधिक सिफारिश।', '4.5'),
        ('OLJCESPC7Z', 'nightskylover', 'इस कीमत पर, यह एक्सप्लोरास्कोप उत्कृष्ट प्रदर्शन देता है। मैं बृहस्पति के चंद्रमाओं को स्पष्ट रूप से देखने में सक्षम था। आकस्मिक दर्शन के लिए एक शानदार खरीदारी।', '4.0'),
        ('OLJCESPC7Z', 'beginner_astro', 'मैन्युअल नियंत्रणों के आदी होने में थोड़ा मुश्किल, लेकिन एक बार जब आप कर लेते हैं, तो यह बहुत फायदेमंद है। पहली बार ओरियन नेबुला देखा! अच्छा मूल्य।', '3.5'),
        ('OLJCESPC7Z', 'celestial_explorer', 'कैंपिंग यात्राओं के लिए बिल्कुल सही। यह हल्का और पोर्टेबल है, जिससे इसे कहीं भी ले जाना आसान हो जाता है। इसके आकार के लिए दृश्य आश्चर्यजनक रूप से अच्छे हैं।', '4.0'),
        ('OLJCESPC7Z', 'telescope_fan', 'सबसे शक्तिशाली स्कोप नहीं, लेकिन यह बच्चों और शुरुआती लोगों के लिए बढ़िया है। मेरे बच्चे इससे चंद्रमा देखना पसंद करते हैं। पारिवारिक मनोरंजन के लिए एक ठोस विकल्प।', '3.0'),

        ('66VCHSJNUP', 'tech_astro', 'StarSense ऐप क्रांतिकारी है! इसने खगोलीय वस्तुओं को ढूंढना अविश्वसनीय रूप से आसान बना दिया। यह टेलीस्कोप शुरुआती लोगों के लिए गेम-चेंजर है।', '5.0'),
        ('66VCHSJNUP', 'app_user', 'अद्भुत तकनीक, स्मार्टफोन एकीकरण निर्बाध रूप से काम करता है। मैंने रात के आकाश का पता लगाने में इतना मज़ा कभी नहीं लिया। हर पैसे के लायक।', '4.5'),
        ('66VCHSJNUP', 'innovator_john', 'सेटअप बहुत आसान था, और ऐप में ट्यूटोरियल बहुत सहायक हैं। दृश्य कुरकुरे और स्पष्ट हैं। मेरी एकमात्र मामूली शिकायत फोन पर बैटरी ड्रेन है।', '4.0'),
        ('66VCHSJNUP', 'clear_skies', 'अंत में, एक टेलीस्कोप जो स्टारगेज़िंग के अनुमान को दूर करता है। रीयल-टाइम पोजिशनिंग अविश्वसनीय रूप से सटीक है। खगोल विज्ञान में नए किसी के लिए भी अत्यधिक अनुशंसित।', '5.0'),
        ('66VCHSJNUP', 'gadget_geek', 'शानदार उत्पाद, ऐप वास्तव में आपका मार्गदर्शन करता है। यह आपके साथ एक व्यक्तिगत खगोलविद रखने जैसा है। ऑप्टिकल गुणवत्ता भी बहुत अच्छी है।', '4.5'),

        ('1YMWWN1N4O', 'solar_viewer', 'सौर अवलोकन के लिए बिल्कुल सही! Solar Safe फ़िल्टर मन की शांति देता है। मैंने इसे पिछले आंशिक ग्रहण के लिए उपयोग किया और यह शानदार था।', '5.0'),
        ('1YMWWN1N4O', 'eclipse_chaser', 'कॉम्पैक्ट और ले जाने में आसान, यह टेलीस्कोप ग्रहण कार्यक्रमों के लिए आदर्श है। शामिल बैकपैक एक अच्छा स्पर्श है। सूरज के दृश्य अविश्वसनीय रूप से स्पष्ट और सुरक्षित हैं।', '4.5'),
        ('1YMWWN1N4O', 'travel_astro', 'सौर दर्शन के लिए उत्कृष्ट यात्रा स्कोप। आवर्धन सूरज के लिए दूरबीन से बहुत बेहतर है। किसी भी सौर उत्साही के लिए जरूरी है।', '4.0'),
        ('1YMWWN1N4O', 'sun_gazer', 'सुरक्षा सुविधाओं और स्पष्टता से बहुत प्रभावित। परिवार के साथ सूरज को साझा करना कभी इतना आसान या सुरक्षित नहीं रहा। समर्पित सौर स्कोप के लिए बढ़िया मूल्य।', '5.0'),
        ('1YMWWN1N4O', 'safe_viewer', 'ISO अनुरूप फ़िल्टर आश्वस्त करने वाला है। यह सुरक्षित सौर अवलोकन के लिए एक अच्छी तरह से डिज़ाइन किया गया उत्पाद है। शैक्षिक उद्देश्यों के लिए भी अत्यधिक अनुशंसित।', '4.5'),

        ('L9ECAV7KIM', 'clean_optics', 'यह किट मेरे सभी ऑप्टिक्स के लिए जीवनरक्षक है। ब्रश और वाइप्स बिना कोई अवशेष छोड़े बिल्कुल काम करते हैं। मेरे लेंस कभी इतने साफ नहीं रहे।', '5.0'),
        ('L9ECAV7KIM', 'photog_pro', 'किसी भी फोटोग्राफर या टेलीस्कोप मालिक के लिए आवश्यक। यह सुरक्षित रूप से धूल और उंगलियों के निशान हटाता है। उच्च गुणवत्ता वाला क्लीनिंग सॉल्यूशन।', '4.5'),
        ('L9ECAV7KIM', 'daily_cleaner', 'मैं इसे अपनी दूरबीन, कैमरा लेंस और यहां तक कि अपनी फोन स्क्रीन पर भी उपयोग करता हूं। यह बहुत प्रभावी और कोमल है। एक बहुमुखी क्लीनिंग किट।', '4.0'),
        ('L9ECAV7KIM', 'tech_maintenance', 'पैसे के लिए बढ़िया मूल्य। विभिन्न क्लीनिंग विकल्प सभी जरूरतों को पूरा करते हैं। मेरे महंगे उपकरण को बेदाग स्थिति में रखता है।', '5.0'),
        ('L9ECAV7KIM', 'sharp_view', 'विज्ञापित अनुसार काम करता है, इसका उपयोग करने के बाद मेरे टेलीस्कोप के दृश्य बहुत स्पष्ट हैं। द्रव और कपड़ा उत्कृष्ट हैं। निश्चित रूप से सिफारिश।', '4.5'),

        ('2ZYFJ3GM2N', 'bird_watcher', 'अविश्वसनीय स्पष्टता और चमक, पक्षी देखने के लिए बिल्कुल सही। ED ग्लास वास्तव में फर्क लाता है। मैं सबसे सूक्ष्म चिह्नों को देख सकता हूं।', '5.0'),
        ('2ZYFJ3GM2N', 'nature_lover', 'प्रकृति अवलोकन के लिए ये दूरबीनें शानदार हैं। नजदीकी वन्यजीवों को देखने के लिए क्लोज फोकस एक बड़ा लाभ है। पकड़ने में बहुत आरामदायक।', '4.5'),
        ('2ZYFJ3GM2N', 'hiker_guy', 'हल्के और टिकाऊ, ये हाइकिंग के लिए मेरी पसंदीदा दूरबीन हैं। व्यू का चौड़ा क्षेत्र उत्कृष्ट है। आउटडोर उत्साही लोगों के लिए अत्यधिक सिफारिश।', '4.0'),
        ('2ZYFJ3GM2N', 'stadium_fan', 'एक गेम में ले गया और एक्शन का शानदार दृश्य मिला। वे विभिन्न प्रकाश स्थितियों में बहुत अच्छा प्रदर्शन करते हैं। एक ठोस ऑल-अराउंड दूरबीन।', '4.0'),
        ('2ZYFJ3GM2N', 'outdoor_adventurer', 'उत्कृष्ट निर्माण गुणवत्ता और ऑप्टिकल प्रदर्शन। वे मजबूत महसूस करते हैं और तेज छवियां प्रदान करते हैं। किसी भी बाहरी गतिविधि के लिए एक बढ़िया निवेश।', '4.5'),

        ('0PUK6V6EV0', 'astro_photog', 'यह इमेजर ग्रहीय फोटोग्राफी के लिए एक शानदार कदम है। रंग गुणवत्ता उत्कृष्ट है। मेरे मौजूदा टेलीस्कोप सेटअप के साथ उपयोग करना आसान है।', '5.0'),
        ('0PUK6V6EV0', 'planet_shooter', 'अंत में शनि और बृहस्पति की शानदार छवियां कैद कर रहा हूं! NexImage 10 इसे इतना सुलभ बनाता है। खगोल फोटोग्राफी में शुरुआती लोगों के लिए बढ़िया।', '4.5'),
        ('0PUK6V6EV0', 'imager_pro', 'इसकी कीमत बिंदु के लिए उत्कृष्ट रिज़ॉल्यूशन और रंग प्रस्तुतिकरण। यह ग्रहों की इमेजिंग शुरू करने वालों के लिए एक सही समाधान है। अत्यधिक संतुष्ट।', '4.0'),
        ('0PUK6V6EV0', 'space_artist', 'इस इमेजर के साथ मैं जो विवरण कैद कर सकता हूं वह अविश्वसनीय है। यह विभिन्न सॉफ्टवेयर के साथ अच्छी तरह से एकीकृत होता है। गंभीर ग्रहीय पर्यवेक्षकों के लिए जरूरी है।', '5.0'),
        ('0PUK6V6EV0', 'digital_sky', 'सौर मंडल इमेजिंग में आने के लिए एक ठोस विकल्प। सेटअप सीधा था। सुंदर, जीवंत ग्रहीय छवियां बनाता है।', '4.5'),

        ('LS4PSXUNUM', 'night_walker', 'खगोल विज्ञान सत्रों के दौरान रात की दृष्टि को संरक्षित करने के लिए लाल रोशनी बिल्कुल सही है। हैंड वार्मर एक अप्रत्याशित बोनस है। बहुत व्यावहारिक उपकरण।', '5.0'),
        ('LS4PSXUNUM', 'star_party_goer', 'स्टार पार्टियों के लिए यह फ्लैशलाइट अपरिहार्य है। रेड मोड आंखों पर कोमल है, और पावर बैंक फीचर बेहद सुविधाजनक है। इसे प्यार करता हूं!', '4.5'),
        ('LS4PSXUNUM', 'camper_chris', 'मजबूत और बहुमुखी, यह फ्लैशलाइट कैंपिंग और रात की सैर के लिए बढ़िया है। हैंड वार्मर फंक्शन ठंडी रातों पर गेम-चेंजर है। अत्यधिक सिफारिश।', '4.5'),
        ('LS4PSXUNUM', 'emergency_kit', 'मेरे इमरजेंसी किट के लिए एक शानदार मल्टी-टूल। रेड लाइट उपयोगी है, और पावर बैंक का मतलब है कि मैं अपना फोन चार्ज कर सकता हूं। बढ़िया डिजाइन।', '4.0'),
        ('LS4PSXUNUM', 'astro_accessory', 'हर खगोलविद को इनमें से एक की जरूरत होती है। रेड लाइट आवश्यक है, और हैंड वार्मर और पावर बैंक इसे अविश्वसनीय रूप से उपयोगी बनाते हैं। एक शीर्ष स्तरीय सहायक उपकरण।', '5.0'),

        ('9SIQT8TOJO', 'deep_sky_master', 'RASA V2 डीप-स्काई इमेजिंग के लिए सपना सच होना है। f/2.2 गति एक्सपोज़र समय को काफी कम कर देती है। अब तक का मेरा सबसे अच्छा खगोल फोटोग्राफी निवेश।', '5.0'),
        ('9SIQT8TOJO', 'pro_astro', 'वाइड-फील्ड खगोल फोटोग्राफी के लिए अविश्वसनीय प्रदर्शन। छोटी फोकल लंबाई गाइडिंग को कम महत्वपूर्ण बनाती है। शानदार, विस्तृत छवियां बनाता है।', '5.0'),
        ('9SIQT8TOJO', 'imaging_guru', 'यह OTA एक दानव है! तेज ऑप्टिक्स का मतलब कम समय में अधिक डेटा। यदि आप डीप-स्काई इमेजिंग के बारे में गंभीर हैं, तो यह एक है।', '4.5'),
        ('9SIQT8TOJO', 'advanced_scope', 'गुणवत्ता और गति के लिए जो यह प्रदान करता है उसके लिए हर पैसे के लायक। मेरी छवियां कभी इतनी तेज या जीवंत नहीं रहीं। सच में पेशेवर स्तर का उपकरण।', '5.0'),
        ('9SIQT8TOJO', 'precision_optics', 'इस RASA के पीछे इंजीनियरिंग असाधारण है। यह धुंधली वस्तुओं को कैद करने के लिए अविश्वसनीय रूप से कुशल है। समर्पित इमेजर्स के लिए एक उच्च-स्तरीय विकल्प।', '4.5'),

        ('6E92ZMYYFZ', 'solar_safety', 'मेरे 8-इंच टेलीस्कोप के साथ सुरक्षित सौर देखने के लिए आवश्यक। वेल्क्रो पट्टियां यह सुनिश्चित करती हैं कि यह सुरक्षित रूप से जगह पर रहे। सौर अवलोकन के दौरान मन की शांति।', '5.0'),
        ('6E92ZMYYFZ', 'telescope_upgrade', 'यह EclipSmart फ़िल्टर मेरे सेटअप के लिए एक सही अतिरिक्त है। ISO अनुपालन महत्वपूर्ण है। सूरज को सुरक्षित रूप से देखने के लिए किसी के लिए भी अत्यधिक सिफारिश।', '4.5'),
        ('6E92ZMYYFZ', 'safe_sun_gazer', 'संलग्न करने में आसान और सूरज के स्पष्ट, सुरक्षित दृश्य प्रदान करता है। निर्माण गुणवत्ता उत्कृष्ट है। सौर उत्साही लोगों के लिए जरूरी सहायक उपकरण।', '5.0'),
        ('6E92ZMYYFZ', 'filter_fan', 'मेरे 8-इंच स्कोप के साथ बिल्कुल काम करता है। आकस्मिक विस्थापन की कोई चिंता नहीं। आपकी आंखों और उपकरण की सुरक्षा के लिए बढ़िया उत्पाद।', '4.5'),
        ('6E92ZMYYFZ', 'eclipse_ready', 'आगामी ग्रहण के लिए इसे खरीदा, और यह बिल्कुल फिट बैठता है। इसे आजमाया, और दृश्य शानदार और सुरक्षित हैं। इस खरीदारी से बहुत खुश।', '5.0'),

        ('HQTGWGPNH4', 'history_buff', 'ऐतिहासिक खगोलीय विचार में एक आकर्षक झलक। सामग्री अविश्वसनीय रूप से अंतर्दृष्टिपूर्ण है। विज्ञान के इतिहास में रुचि रखने वालों के लिए जरूरी पढ़ना।', '5.0'),
        ('HQTGWGPNH4', 'bookworm_astro', 'सुंदर रूप से प्रस्तुत ऐतिहासिक दस्तावेज़। यह देखना आश्चर्यजनक है कि सदियों पहले धूमकेतुओं को कैसे समझा जाता था। किसी भी खगोलीय पुस्तकालय के लिए एक मूल्यवान अतिरिक्त।', '4.5'),
        ('HQTGWGPNH4', 'ancient_texts', 'इतना अनूठा और रोमांचक पढ़ना। ऐतिहासिक संदर्भ मनोरम है। यह खगोलीय घटनाओं पर एक अलग दृष्टिकोण प्रदान करता है।', '4.0'),
        ('HQTGWGPNH4', 'celestial_history', 'मुझे ऐतिहासिक खगोल विज्ञान पसंद है, और यह किताब वितरित करती है। यह अच्छी तरह से शोधित है और पिछली मान्यताओं में एक खिड़की प्रदान करता है। विद्वानों के लिए अत्यधिक अनुशंसित।', '5.0'),
        ('HQTGWGPNH4', 'rare_find', 'खगोलीय इतिहास के उत्साही लोगों के लिए एक वास्तव में विशेष किताब। प्राचीन ज्योतिषियों के बारे में विवरण बहुत रोचक हैं। गहरी समझ के लिए बढ़िया।', '4.5');

    -- Product Catalog Service: create a schema
    CREATE SCHEMA catalog;
