        price_currency_code TEXT NOT NULL,
        price_units BIGINT NOT NULL,
        price_nanos INT NOT NULL,
        categories TEXT
    );

    -- Product Catalog Service: grant permission to schema
    GRANT SELECT ON ALL TABLES IN SCHEMA catalog TO otelu;

    -- Product Catalog Service: add product data
    INSERT INTO catalog.products (id, name, description, picture, price_currency_code, price_units, price_nanos, categories)
    VALUES
        ('OLJCESPC7Z', 'नेशनल पार्क फाउंडेशन एक्सप्लोरास्कोप', 'नेशनल पार्क फाउंडेशन (NPF) का एक्सप्लोरास्कोप 60AZ एक मैन्युअल ऑल्ट-अज़ीमुथ, रिफ्रैक्टर टेलीस्कोप है जो चलते-फिरते खगोलीय दर्शन के लिए बिल्कुल सही है। NPF एक्सप्लोरास्कोप 60 ग्रहों, चंद्रमा, तारा समूहों और ओरियन नेबुला तथा एंड्रोमेडा गैलेक्सी जैसी चमकीली गहरे आकाश की वस्तुओं को देख सकता है।', 'NationalParkFoundationExplorascope.jpg', 'INR', 8500, 0, 'telescopes'),
        ('66VCHSJNUP', 'स्टारसेंस एक्सप्लोरर रिफ्रैक्टर टेलीस्कोप', 'पहला टेलीस्कोप जो आपके स्मार्टफोन का उपयोग रात के आकाश का विश्लेषण करने और रीयल-टाइम में इसकी स्थिति की गणना करने के लिए करता है। ऐप के उपयोगकर्ता-अनुकूल इंटरफेस और विस्तृत ट्यूटोरियल के लिए धन्यवाद, StarSense Explorer शुरुआती लोगों के लिए आदर्श है। यह आपके अपने व्यक्तिगत रात के आकाश के दौरे गाइड रखने जैसा है।', 'StarsenseExplorer.jpg', 'INR', 29500, 0, 'telescopes'),
        ('1YMWWN1N4O', 'एक्लिप्समार्ट ट्रैवल रिफ्रैक्टर टेलीस्कोप', 'चलते-फिरते पर्यवेक्षक के लिए समर्पित श्वेत-प्रकाश सौर स्कोप। 50mm रिफ्रैक्टिंग सौर स्कोप सौर घटनाओं के सबसे सुरक्षित दृश्य सुनिश्चित करने के लिए Solar Safe, ISO अनुरूप, पूर्ण-द्वारक कांच फ़िल्टर सामग्री का उपयोग करता है। किट में आपको जो कुछ भी चाहिए वह सब पूरा आता है, जिसमें समर्पित यात्रा सौर स्कोप, Solar Safe फाइंडरस्कोप, ट्राइपॉड, उच्च गुणवत्ता वाला 20mm (18x) केलनर आईपीस और सब कुछ ले जाने के लिए नायलॉन बैकपैक शामिल है। यह यात्रा सौर स्कोप परिवार के साथ सूरज के साथ-साथ आंशिक और पूर्ण सौर ग्रहण को साझा करना आसान बनाता है और हाथ में पकड़ने वाले सौर व्यूअर या दूरबीन का उपयोग करने की तुलना में बहुत अधिक आवर्धन प्रदान करता है।', 'EclipsmartTravelRefractorTelescope.jpg', 'INR', 10900, 0, 'telescopes,travel'),
        ('L9ECAV7KIM', 'लेंस क्लीनिंग किट', 'अपने लेंस पर धूल, गंदगी, उंगलियों के निशान और अन्य कणों को मिटाएं ताकि लेंस क्लीनिंग किट के साथ स्पष्ट रूप से देख सकें। यह क्लीनिंग किट सभी कांच और ऑप्टिकल सतहों पर काम करती है, जिसमें टेलीस्कोप, दूरबीन, स्पॉटिंग स्कोप, मोनोकुलर, माइक्रोस्कोप, और यहां तक कि आपके कैमरा लेंस, कंप्यूटर स्क्रीन और मोबाइल डिवाइस भी शामिल हैं। किट में धूल के कणों और गंदगी को हटाने के लिए एक रिट्रैक्टेबल लेंस ब्रश और आपके ऑप्टिक्स से दाग और उंगलियों के निशान को साफ करने के लिए दो विकल्प, पूर्व-नम लेंस वाइप्स और मुलायम कपड़े के साथ बोतलबंद लेंस क्लीनिंग द्रव पूरा आता है।', 'LensCleaningKit.jpg', 'INR', 1850, 0, 'accessories'),
        ('2ZYFJ3GM2N', 'रूफ दूरबीन', 'यह बहुमुखी, ऑल-अराउंड दूरबीन ट्रेल, स्टेडियम, एरीना, या लगभग कहीं भी एक बढ़िया विकल्प है जहां आप चमक या विवरण का त्याग किए बिना एक्शन का क्लोज-अप देखना चाहते हैं। यह विशेष रूप से प्रकृति अवलोकन और पक्षी देखने के लिए एक बढ़िया साथी है, ED ग्लास के साथ जो आपको सबसे सूक्ष्म क्षेत्र चिह्नों को देखने में मदद करता है और सिर्फ 6.5 फीट का क्लोज फोकस है।', 'RoofBinoculars.jpg', 'INR', 17700, 0, 'binoculars'),
        ('0PUK6V6EV0', 'सोलर सिस्टम कलर इमेजर', 'आपके पास अपना नया टेलीस्कोप है और शनि और बृहस्पति का अवलोकन किया है। अब आप अगला कदम उठाने और उनकी इमेजिंग शुरू करने के लिए तैयार हैं। लेकिन आप कहां से शुरू करें? NexImage 10 सोलर सिस्टम इमेजर सही समाधान है।', 'SolarSystemColorImager.jpg', 'INR', 14800, 0, 'accessories,telescopes'),
        ('LS4PSXUNUM', 'रेड फ्लैशलाइट', 'यह 3-इन-1 डिवाइस 3-मोड लाल फ्लैशलाइट, हैंड वार्मर, और चलते-फिरते अपने व्यक्तिगत इलेक्ट्रॉनिक्स को रिचार्ज करने के लिए पोर्टेबल पावर बैंक की सुविधा देता है। चाहे आप इसका उपयोग खगोलीय स्टार पार्टी, रात की सैर, या वन्यजीव अनुसंधान में रास्ता रोशन करने के लिए करें, ThermoTorch 3 Astro Red का मजबूत, IPX4-रेटेड डिज़ाइन आपकी दैनिक गतिविधियों को सहन करेगा।', 'RedFlashlight.jpg', 'INR', 4900, 0, 'accessories,flashlights'),
        ('9SIQT8TOJO', 'ऑप्टिकल ट्यूब असेंबली', 'प्रभावशाली डीप-स्काई एस्ट्रोइमेज कैद करना पहले से कहीं अधिक आसान है रो-एकरमैन श्मिट एस्ट्रोग्राफ (RASA) V2 के साथ, जो आज के शीर्ष DSLR या खगोलीय CCD कैमरों का सही साथी है। यह तेज़, वाइड-फील्ड f/2.2 सिस्टम पारंपरिक f/10 एस्ट्रोइमेजिंग की तुलना में छोटे एक्सपोज़र समय की अनुमति देता है, बिना रिज़ॉल्यूशन का त्याग किए। चूंकि छोटे सब-एक्सपोज़र समय संभव हैं, इसलिए आपके इक्वेटोरियल माउंट को लंबे समय तक सटीक रूप से ट्रैक करने की आवश्यकता नहीं होगी। छोटी फोकल लंबाई इक्वेटोरियल ट्रैकिंग की मांगों को भी कम करती है। कई मामलों में, ऑटोगाइडिंग की आवश्यकता नहीं होगी।', 'OpticalTubeAssembly.jpg', 'INR', 304000, 0, 'accessories,telescopes,assembly'),
        ('6E92ZMYYFZ', 'सोलर फ़िल्टर', '8" टेलीस्कोप के लिए EclipSmart Solar Filter के साथ अपने देखने के अनुभव को बढ़ाएं। दो वेल्क्रो पट्टियों और अतिरिक्त सुरक्षा के लिए चार स्वयं-चिपकने वाले वेल्क्रो पैड के साथ, आप आश्वस्त हो सकते हैं कि सौर फ़िल्टर को आकस्मिक रूप से हटाया नहीं जा सकता है और Solar Safe, ISO अनुरूप दर्शन प्रदान करेगा।', 'SolarFilter.jpg', 'INR', 5800, 0, 'accessories,telescopes'),
        ('HQTGWGPNH4', 'द कॉमेट बुक', '16वीं सदी का धूमकेतुओं पर एक शोध-ग्रंथ, जो अनाम रूप से फ्लैंडर्स (अब उत्तरी फ्रांस) में बनाया गया था और अब यूनिवर्सिटैट्सबिब्लियोथेक कासेल में रखा गया है। आमतौर पर द कॉमेट बुक (या जर्मन में कोमेटेनबुक) के नाम से जाना जाता है, इसका पूरा शीर्षक "टॉलमी, अल्बुमासर, हेली, एलिक्विंड और अन्य ज्योतिषियों के अनुसार धूमकेतु और उनके सामान्य और विशेष अर्थ" के रूप में अनुवादित होता है। छवि https://publicdomainreview.org/collection/the-comet-book से है, यूनिवर्सिटैट्सबिब्लियोथेक कासेल द्वारा CC-BY SA 4.0 लाइसेंस (https://creativecommons.org/licenses/by-sa/4.0/) के तहत उपलब्ध कराई गई है।', 'TheCometBook.jpg', 'INR', 0, 0, 'books');
