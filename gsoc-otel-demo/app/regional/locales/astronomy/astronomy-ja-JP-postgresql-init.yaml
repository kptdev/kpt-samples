# Source: opentelemetry-demo/templates/posgresql-init-config.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: astronomy-postgresql-init
  labels:
    helm.sh/chart: opentelemetry-demo-0.40.9
    app.kubernetes.io/version: 2.2.0
    app.kubernetes.io/part-of: opentelemetry-demo
    app.kubernetes.io/managed-by: Helm
  namespace: otel-demo
data:
  init.sql: |
    -- Copyright The OpenTelemetry Authors
    -- SPDX-License-Identifier: Apache-2.0

    CREATE USER otelu WITH PASSWORD 'otelp';

    -- Accounting Service: create a schema
    CREATE SCHEMA accounting;
    GRANT USAGE ON SCHEMA accounting TO otelu;

    -- Accounting Service: create tables
    CREATE TABLE accounting."order" (
        order_id TEXT PRIMARY KEY
    );

    CREATE TABLE accounting.shipping (
        shipping_tracking_id TEXT PRIMARY KEY,
        shipping_cost_currency_code TEXT NOT NULL,
        shipping_cost_units BIGINT NOT NULL,
        shipping_cost_nanos INT NOT NULL,
        street_address TEXT,
        city TEXT,
        state TEXT,
        country TEXT,
        zip_code TEXT,
        order_id TEXT NOT NULL,
        FOREIGN KEY (order_id) REFERENCES accounting."order"(order_id) ON DELETE CASCADE
    );

    CREATE TABLE accounting.orderitem (
        item_cost_currency_code TEXT NOT NULL,
        item_cost_units BIGINT NOT NULL,
        item_cost_nanos INT NOT NULL,
        product_id TEXT NOT NULL,
        quantity INT NOT NULL,
        order_id TEXT NOT NULL,
        PRIMARY KEY (order_id, product_id),
        FOREIGN KEY (order_id) REFERENCES accounting."order"(order_id) ON DELETE CASCADE
    );

    -- Accounting Service: grant permission to schema
    GRANT SELECT, INSERT, UPDATE ON ALL TABLES IN SCHEMA accounting TO otelu;

    -- Product Review Service: create a schema
    CREATE SCHEMA reviews;
    GRANT USAGE ON SCHEMA reviews TO otelu;

    -- Product Review Service: create tables
    CREATE TABLE reviews.productreviews (
        id INTEGER GENERATED BY DEFAULT AS IDENTITY PRIMARY KEY,
        product_id VARCHAR(16) NOT NULL,
        username VARCHAR(64) NOT NULL,
        description VARCHAR(1024),
        score NUMERIC(2,1) NOT NULL
    );

    -- Product Review Service: create index for product_id lookups
    CREATE INDEX product_id_index ON reviews.productreviews (product_id);

    -- Product Review Service: grant permission to schema
    GRANT SELECT, INSERT, UPDATE ON ALL TABLES IN SCHEMA reviews TO otelu;

    -- Product Review Service:  add product review data
    INSERT INTO reviews.productreviews (product_id, username, description, score)
    VALUES
        ('OLJCESPC7Z', 'stargazer_mike', '素晴らしい入門用望遠鏡です！セットアップが簡単で、月や明るい惑星をクリアに見ることができます。天文初心者に強くお勧めします。', '4.5'),
        ('OLJCESPC7Z', 'nightskylover', 'この価格でExplorascopeは素晴らしい性能を発揮します。木星の衛星をはっきりと見ることができました。カジュアルな観察に最適な一台です。', '4.0'),
        ('OLJCESPC7Z', 'beginner_astro', '手動操作に慣れるまで少し手間がかかりますが、慣れてしまえばとてもやりがいがあります。初めてオリオン大星雲を見ました！コストパフォーマンスは良いです。', '3.5'),
        ('OLJCESPC7Z', 'celestial_explorer', 'キャンプ旅行に最適です。軽量で携帯性に優れているので、どこへでも簡単に持ち運べます。このサイズにしては驚くほど良い見え方です。', '4.0'),
        ('OLJCESPC7Z', 'telescope_fan', '最も強力なスコープではありませんが、子供や初心者にはぴったりです。私の子供たちはこれで月を見るのが大好きです。家族の楽しみには確かな選択肢です。', '3.0'),

        ('66VCHSJNUP', 'tech_astro', 'StarSenseアプリは革命的です！天体を探すのが信じられないほど簡単になりました。この望遠鏡は初心者にとってまさにゲームチェンジャーです。', '5.0'),
        ('66VCHSJNUP', 'app_user', '驚くべき技術で、スマートフォンとの連携が完璧に動作します。夜空の探索をこんなに楽しく感じたことはありません。投資する価値があります。', '4.5'),
        ('66VCHSJNUP', 'innovator_john', 'セットアップはとても簡単で、アプリのチュートリアルも非常に役立ちます。見え方は鮮明でクリアです。唯一の小さな不満はスマートフォンのバッテリー消費です。', '4.0'),
        ('66VCHSJNUP', 'clear_skies', 'ついに、天体観測の推測を取り除いてくれる望遠鏡が登場しました。リアルタイム測位は信じられないほど正確です。初めて天文に触れる方にも強くお勧めします。', '5.0'),
        ('66VCHSJNUP', 'gadget_geek', '素晴らしい製品で、アプリが本当に案内してくれます。まるで個人の天文学者がそばにいるようです。光学性能も非常に優れています。', '4.5'),

        ('1YMWWN1N4O', 'solar_viewer', '太陽観察にぴったりです！Solar Safeフィルターが安心感を与えてくれます。前回の部分日食に使用しましたが、素晴らしい体験でした。', '5.0'),
        ('1YMWWN1N4O', 'eclipse_chaser', 'コンパクトで携帯性に優れたこの望遠鏡は、日食観測イベントに理想的です。付属のバックパックは嬉しい配慮です。太陽の見え方は信じられないほどクリアで安全です。', '4.5'),
        ('1YMWWN1N4O', 'travel_astro', '太陽観察に最適な旅行用スコープです。倍率は太陽用の双眼鏡よりもはるかに優れています。太陽観測ファンには必須のアイテムです。', '4.0'),
        ('1YMWWN1N4O', 'sun_gazer', '安全機能と鮮明さに大変感心しました。家族と一緒に太陽を観望することがかつてないほど簡単で安全になりました。専用の太陽スコープとして価値があります。', '5.0'),
        ('1YMWWN1N4O', 'safe_viewer', 'ISO準拠のフィルターは安心感があります。安全な太陽観察のためによく設計された製品です。教育目的にも強くお勧めします。', '4.5'),

        ('L9ECAV7KIM', 'clean_optics', 'このキットは私のすべての光学機器にとって救世主です。ブラシとワイプは跡を残さずに完璧に機能します。レンズがこんなにきれいになったことはありません。', '5.0'),
        ('L9ECAV7KIM', 'photog_pro', '写真家や望遠鏡の所有者にとって必需品です。ホコリや指紋を安全に取り除いてくれます。高品質なクリーニングソリューションです。', '4.5'),
        ('L9ECAV7KIM', 'daily_cleaner', '双眼鏡、カメラレンズ、スマートフォンの画面にも使用しています。とても効果的で優しいです。汎用性の高いクリーニングキットです。', '4.0'),
        ('L9ECAV7KIM', 'tech_maintenance', 'コストパフォーマンスに優れています。さまざまなクリーニングオプションがあらゆるニーズに対応します。高価な機器を pristine な状態に保ってくれます。', '5.0'),
        ('L9ECAV7KIM', 'sharp_view', '宣伝通りで、使用後は望遠鏡の見え方がとてもクリアになります。液体と布の質が優れています。間違いなくお勧めします。', '4.5'),

        ('2ZYFJ3GM2N', 'bird_watcher', '信じられないほどの透明度と明るさで、バードウォッチングに最適です。EDガラスが本当に違います。最も微妙な模様も見分けることができます。', '5.0'),
        ('2ZYFJ3GM2N', 'nature_lover', 'この双眼鏡は自然観察に素晴らしいです。近距離の野生動物を観察するための近接フォーカスが大きな利点です。持ち心地も非常に快適です。', '4.5'),
        ('2ZYFJ3GM2N', 'hiker_guy', '軽量で耐久性があり、ハイキングには私の一押しの双眼鏡です。広視野が素晴らしいです。アウトドア愛好家に強くお勧めします。', '4.0'),
        ('2ZYFJ3GM2N', 'stadium_fan', '試合に持って行きましたが、アクションが見事に観えました。さまざまな照明条件下でも優れた性能を発揮します。確かなオールラウンド双眼鏡です。', '4.0'),
        ('2ZYFJ3GM2N', 'outdoor_adventurer', 'ビルド品質と光学性能が優れています。堅牢な感触で、鮮明な画像を提供します。あらゆるアウトドア活動への素晴らしい投資です。', '4.5'),

        ('0PUK6V6EV0', 'astro_photog', 'このイメージャーは惑星写真撮影への素晴らしいステップアップです。色再現性が優れています。既存の望遠鏡セットアップで簡単に使えます。', '5.0'),
        ('0PUK6V6EV0', 'planet_shooter', 'ついに土星と木星の素晴らしい画像を捉えることができました！NexImage 10は天体写真を身近なものにしてくれます。天体写真初心者に最適です。', '4.5'),
        ('0PUK6V6EV0', 'imager_pro', 'この価格帯では優れた解像度と色再現性を実現しています。惑星イメージングを始めたい方に最適なソリューションです。大変満足しています。', '4.0'),
        ('0PUK6V6EV0', 'space_artist', 'このイメージャーで捉えられるディテールは驚くほどです。さまざまなソフトウェアとよく統合されます。本格的な惑星観測者にとって必須のアイテムです。', '5.0'),
        ('0PUK6V6EV0', 'digital_sky', '太陽系イメージングを始めるための確かな選択肢です。セットアップは簡単でした。美しく vibrant な惑星画像を生成します。', '4.5'),

        ('LS4PSXUNUM', 'night_walker', '天文観測セッション中の暗順応維持に赤い光が最適です。ハンドウォーマーは予想外のボーナスです。とても実用的なデバイスです。', '5.0'),
        ('LS4PSXUNUM', 'star_party_goer', 'スター パーティにはこのフラッシュライトが欠かせません。赤色モードは目に優しく、パワーバンク機能はとても便利です。大好きです！', '4.5'),
        ('LS4PSXUNUM', 'camper_chris', '堅牢で多用途、このフラッシュライトはキャンプや夜の散歩に最適です。ハンドウォーマー機能は寒い夜には game changer です。強くお勧めします。', '4.5'),
        ('LS4PSXUNUM', 'emergency_kit', '私の emergency kit には素晴らしいマルチツールです。赤色ライトが便利で、パワーバンクで Phone を充電できます。素晴らしいデザインです。', '4.0'),
        ('LS4PSXUNUM', 'astro_accessory', 'すべての天文ファンに必要な一台です。赤色ライトは essential で、ハンドウォーマーとパワーバンクが信じられないほど便利にしてくれます。トップクラスのアクセサリーです。', '5.0'),

        ('9SIQT8TOJO', 'deep_sky_master', 'RASA V2はディープスカイイメージングの夢の実現です。f/2.2のスピードが露光時間を劇的に短縮します。今までで最高の天体写真投資です。', '5.0'),
        ('9SIQT8TOJO', 'pro_astro', '広視野天体写真で素晴らしい性能を発揮します。短い焦点距離によりガイドの重要性が下がります。 stunning で詳細な画像を生成します。', '5.0'),
        ('9SIQT8TOJO', 'imaging_guru', 'この OTA はまさに野獣です！高速光学系により短い時間でより多くのデータを取得できます。ディープスカイイメージングに真剣なら、これが答えです。', '4.5'),
        ('9SIQT8TOJO', 'advanced_scope', '提供する品質とスピードを考えると価値があります。私の画像はかつてないほどシャープで vibrant です。まさにプロフェッショナルグレードの機器です。', '5.0'),
        ('9SIQT8TOJO', 'precision_optics', 'この RASA の背後にあるエンジニアリングは exceptional です。淡い天体の捕捉に非常に効率的です。 dedicated なイメージャー向けのハイエンドな選択肢です。', '4.5'),

        ('6E92ZMYYFZ', 'solar_safety', '私の8インチ望遠鏡で安全に太陽観察するための essential なアイテムです。ベルクロストラップでしっかりと固定されます。太陽観察中の安心感があります。', '5.0'),
        ('6E92ZMYYFZ', 'telescope_upgrade', 'この EclipSmart フィルターは私のセットアップに完璧な追加です。ISO 準拠は重要なポイントです。太陽を安全に観察したい方に強くお勧めします。', '4.5'),
        ('6E92ZMYYFZ', 'safe_sun_gazer', '取り付けが簡単で、太陽のクリスタルクリアで安全な見え方を提供します。ビルド品質は素晴らしいです。太陽観測ファンにとって必須のアクセサリーです。', '5.0'),
        ('6E92ZMYYFZ', 'filter_fan', '私の8インチスコープで完璧に機能します。偶発的な脱落の心配がなくなりました。目と機器を保護するための素晴らしい製品です。', '4.5'),
        ('6E92ZMYYFZ', 'eclipse_ready', '今後のある日食のために購入しましたが、完璧にフィットします。テストしてみたところ、見え方は素晴らしく安全です。この購入に大満足です。', '5.0'),

        ('HQTGWGPNH4', 'history_buff', '歴史的な天文思想の魅力的な glimpse です。コンテンツは驚くほど insightful です。科学の歴史に興味がある方に必読の一冊です。', '5.0'),
        ('HQTGWGPNH4', 'bookworm_astro', '美しく提示された歴史的文書です。何世紀も前に彗星がどう理解されていたかを知るのは amazing です。どの天文 library にも valuable な追加です。', '4.5'),
        ('HQTGWGPNH4', 'ancient_texts', 'こんな unique で intriguing な読み物です。歴史的 context は captivating で、天体現象について different な perspective を提供します。', '4.0'),
        ('HQTGWGPNH4', 'celestial_history', '歴史的天文学が大好きで、この本は deliver してくれます。よく researched で、過去の beliefs への window を提供します。学者に highly recommended です。', '5.0'),
        ('HQTGWGPNH4', 'rare_find', '天文学の歴史愛好者にとって本当に special な本です。古代の astrologers に関する詳細は very interesting で、deeper understanding に great です。', '4.5');

    -- Product Catalog Service: create a schema
    CREATE SCHEMA catalog;
    GRANT USAGE ON SCHEMA catalog TO otelu;

    -- Product Catalog Service: create tables
    CREATE TABLE catalog.products (
        id TEXT PRIMARY KEY,
        name TEXT NOT NULL,
        description TEXT,
        picture TEXT,
        price_currency_code TEXT NOT NULL,
        price_units BIGINT NOT NULL,
        price_nanos INT NOT NULL,
        categories TEXT
    );

    -- Product Catalog Service: grant permission to schema
    GRANT SELECT ON ALL TABLES IN SCHEMA catalog TO otelu;

    -- Product Catalog Service: add product data
    INSERT INTO catalog.products (id, name, description, picture, price_currency_code, price_units, price_nanos, categories)
    VALUES
        ('OLJCESPC7Z', 'ナショナルパーク財団エクスプロラスコープ', 'ナショナルパーク財団(NPF)のエクスプロラスコープ 60AZは、外出先での天体観察に最適なマニュアルアルタジマウント屈折望遠鏡です。NPFエクスプロラスコープ 60は、惑星、月、星団、そしてオリオン大星雲やアンドロメダ銀河などの明るい deep-sky 天体を観察することができます。', 'NationalParkFoundationExplorascope.jpg', 'JPY', 15800, 0, 'telescopes'),
        ('66VCHSJNUP', 'スターセンスエクスプローラー屈折望遠鏡', '初めて、あなたのスマートフォンを使用して夜空を分析し、その位置をリアルタイムで計算する望遠鏡です。StarSense Explorerは、アプリのユーザーフレンドリーなインターフェースと詳細なチュートリアルにより、初心者に最適です。自分の専属の夜空ツアーガイドがいるようなものです。', 'StarsenseExplorer.jpg', 'JPY', 49800, 0, 'telescopes'),
        ('1YMWWN1N4O', 'エクリップスマート旅行用屈折望遠鏡', '外出先で観察する方のための専用白色光太陽スコープです。50mm屈折太陽スコープは、Solar Safe、ISO準拠、フル aperture ガラスフィルター素材を使用して、太陽現象の最も安全な観察を保証します。キットには、専用の旅行用太陽スコープ、Solar Safeファインダースコープ、三脚、高品質な20mm(18x)ケルナー接眼レンズ、すべてを収納するナイロンバックパックなど、必要なものがすべて含まれています。この旅行用太陽スコープは、家族全員で太陽や部分日食・皆既日食を簡単に共有でき、ハンドヘルド太陽観察グラスや双眼鏡よりもはるかに高い倍率を提供します。', 'EclipsmartTravelRefractorTelescope.jpg', 'JPY', 19800, 0, 'telescopes,travel'),
        ('L9ECAV7KIM', 'レンズクリーニングキット', 'レンズクリーニングキットで、レンズについたホコリ、汚れ、指紋、その他の粒子を拭ってクリアな視界を取り戻しましょう。このクリーニングキットは、望遠鏡、双眼鏡、スポッティングスコープ、モノキュラー、顕微鏡、さらにはカメラレンズ、コンピュータースクリーン、モバイルデバイスなど、すべてのガラスおよび光学 surface で機能します。キットには、ホコリの粒子や汚れを取り除く retractable レンズブラシと、光学機器から汚れや指紋をクリーニングする2つのオプション(湿らせたレンズワイプと柔らかい布付きボトル入りレンズクリーニング液)が付属しています。', 'LensCleaningKit.jpg', 'JPY', 3200, 0, 'accessories'),
        ('2ZYFJ3GM2N', 'ルーフ双眼鏡', 'この versatile な all-around 双眼鏡は、トレイル、スタジアム、アリーナ、または明るさや detail を犠牲にせずにアクションのクローズアップビューを望むほぼあらゆる場所で最適な選択肢です。EDガラスがフィールドの最も微妙な markings を見つけるのに役立ち、6.5フィートの近接フォーカスを備えているため、自然観察やバードウォッチングに特に優れたコンパニオンです。', 'RoofBinoculars.jpg', 'JPY', 31500, 0, 'binoculars'),
        ('0PUK6V6EV0', '太陽系カラーイメージャー', '新しい望遠鏡で土星と木星を観察したあなたに。次の一歩を踏み出して、その姿を imaging してみましょう。でも、どこから始めればいいでしょうか？NexImage 10太陽系イメージャーが完璧なソリューションです。', 'SolarSystemColorImager.jpg', 'JPY', 26500, 0, 'accessories,telescopes'),
        ('LS4PSXUNUM', 'レッドフラッシュライト', 'この3-in-1デバイスは、3モードの赤いフラッシュライト、ハンドウォーマー、そして外出先で personal electronics を充電できるポータブルパワーバンクを備えています。天文 star party、夜の散歩、野生動物調査で道を照らすために使用する際、ThermoTorch 3 Astro Redの堅牢な IPX4-rated design は日常の使用に耐えます。', 'RedFlashlight.jpg', 'JPY', 8800, 0, 'accessories,flashlights'),
        ('9SIQT8TOJO', '光学管アセンブリ', '印象的な deep-sky アストロ画像を capturing することが、Rowe-Ackermann Schmidt Astrograph(RASA) V2によりかつてないほど容易になりました。これは、今日のトップクラスのDSLRまたは天文用CCDカメラの完璧なコンパニオンです。この高速広視野 f/2.2 システムは、resolution を犠牲にすることなく、従来の f/10 アストロイメージングと比較して短い露出時間を可能にします。短い sub-exposure 時間が可能なため、赤道儀は extended periods にわたって正確に tracking する必要がありません。短い焦点距離は赤道 tracking の要求も軽減します。多くの場合、autoguiding は必要ありません。', 'OpticalTubeAssembly.jpg', 'JPY', 549000, 0, 'accessories,telescopes,assembly'),
        ('6E92ZMYYFZ', '太陽フィルター', '8インチ望遠鏡用の EclipSmart 太陽フィルターで、観察体験を向上させましょう。2つのベルクロストラップと added safety のための4つの self-adhesive ベルクロパッドにより、太陽フィルターが誤って外れることはなく、Solar Safe、ISO準拠の安全な観察を提供できます。', 'SolarFilter.jpg', 'JPY', 10500, 0, 'accessories,telescopes'),
        ('HQTGWGPNH4', 'ザ・コメット・ブック', '16世紀にフランドル(現在の北フランス)で匿名で作成され、現在は Universitätsbibliothek Kassel に所蔵されている彗星に関する論文です。一般的に Comet Book(ドイツ語で Kometenbuch)として知られ、その完全なタイトルは「プトレマイオス、Albumasar、Haly、Aliquind および他の占星術師による、彗星とその一般的かつ特別な意味」と翻訳されます。画像は https://publicdomainreview.org/collection/the-comet-book からのもので、Universitätsbibliothek Kassel によって CC-BY SA 4.0 ライセンス(https://creativecommons.org/licenses/by-sa/4.0/)の下で提供されています。', 'TheCometBook.jpg', 'JPY', 0, 0, 'books');
