apiVersion: v1
kind: ConfigMap
metadata:
  name: florist-ja-JP-postgresql-init
  annotations:
    config.kubernetes.io/local-config: "true"
  namespace: otel-demo
data:
  init.sql: |
    -- Copyright The OpenTelemetry Authors
    -- SPDX-License-Identifier: Apache-2.0

    CREATE USER otelu WITH PASSWORD 'otelp';

    -- Accounting Service: create a schema
    CREATE SCHEMA accounting;
    GRANT USAGE ON SCHEMA accounting TO otelu;

    -- Accounting Service: create tables
    CREATE TABLE accounting."order" (
        order_id TEXT PRIMARY KEY
    );

    CREATE TABLE accounting.shipping (
        shipping_tracking_id TEXT PRIMARY KEY,
        shipping_cost_currency_code TEXT NOT NULL,
        shipping_cost_units BIGINT NOT NULL,
        shipping_cost_nanos INT NOT NULL,
        street_address TEXT,
        city TEXT,
        state TEXT,
        country TEXT,
        zip_code TEXT,
        order_id TEXT NOT NULL,
        FOREIGN KEY (order_id) REFERENCES accounting."order"(order_id) ON DELETE CASCADE
    );

    CREATE TABLE accounting.orderitem (
        item_cost_currency_code TEXT NOT NULL,
        item_cost_units BIGINT NOT NULL,
        item_cost_nanos INT NOT NULL,
        product_id TEXT NOT NULL,
        quantity INT NOT NULL,
        order_id TEXT NOT NULL,
        PRIMARY KEY (order_id, product_id),
        FOREIGN KEY (order_id) REFERENCES accounting."order"(order_id) ON DELETE CASCADE
    );

    -- Accounting Service: grant permission to schema
    GRANT SELECT, INSERT, UPDATE ON ALL TABLES IN SCHEMA accounting TO otelu;

    -- Product Review Service: create a schema
    CREATE SCHEMA reviews;
    GRANT USAGE ON SCHEMA reviews TO otelu;

    -- Product Review Service: create tables
    CREATE TABLE reviews.productreviews (
        id INTEGER GENERATED BY DEFAULT AS IDENTITY PRIMARY KEY,
        product_id VARCHAR(16) NOT NULL,
        username VARCHAR(64) NOT NULL,
        description VARCHAR(1024),
        score NUMERIC(2,1) NOT NULL
    );

    -- Product Review Service: create index for product_id lookups
    CREATE INDEX product_id_index ON reviews.productreviews (product_id);

    -- Product Review Service: grant permission to schema
    GRANT SELECT, INSERT, UPDATE ON ALL TABLES IN SCHEMA reviews TO otelu;

    -- Product Review Service:  add product review data
    INSERT INTO reviews.productreviews (product_id, username, description, score)
    VALUES
        ('FLR001', 'flower_lover', 'これらの赤いバラは素晴らしい!新鮮で鮮やかに届き、花束は1週間以上持ちました。記念日にぴったりです。', '5.0'),
        ('FLR001', 'romantic_guy', 'バレンタインデーに注文してパートナーが大喜び。香りが部屋を満たしました。ロマンチックな機会に強くお勧めします。', '4.5'),
        ('FLR001', 'gift_giver', '美しい包装で、バラは満開でした。素晴らしい誕生日プレゼントになりました。必ずまた注文します。', '4.5'),
        ('FLR001', 'home_decorator', '深い赤色は画像通りでした。リビングに優雅さを加えてくれました。新鮮さの保証は本物です。', '4.0'),
        ('FLR001', 'repeat_buyer', '3回目の注文です。毎回安定した品質。バラはいつも長茎で美しい。', '5.0'),

        ('FLR002', 'minimalist_fan', '白いユリは純粋なエレガンス。繊細な香りが天国のように心地よく、強すぎない。現代の装飾に最適。', '5.0'),
        ('FLR002', 'sympathy_sender', '悲しみに暮れる友人に送りました。純白のユリが慰めと平和をもたらしました。アレンジメントは上品で格調高い。', '4.5'),
        ('FLR002', 'scent_enthusiast', '自然な花の香りが好きなら、これらのユリは夢のよう。数日间、廊下を神聖な香りで満たしてくれました。', '4.5'),
        ('FLR002', 'wedding_planner', 'ブライダルシャワーのセンターピースに使用。皆がどこで買ったか聞いてきました。ユリがその晩美しく開きました。', '5.0'),
        ('FLR002', 'office_buyer', '受付に注文。プロフェッショナルでエレガント、そして長持ちします。品質に対する価値が高い。', '4.0'),

        ('FLR003', 'spring_fan', 'これらのチューリップは春の象徴!明るく cheerful な色彩がすぐに気分を高めてくれました。多様性に富んだミックス。', '5.0'),
        ('FLR003', 'budget_buyer', 'この価格では素晴らしい価値。チューリップは新鮮で、10日近く持ちました。自分への手頃なご褒美に最適。', '4.0'),
        ('FLR003', 'color_lover', 'ピンク、黄色、紫のチューリップのミックスが大好き。如此欢乐なセンターピースを作ってくれました。ウェブサイト通り。', '4.5'),
        ('FLR003', 'garden_newbie', '初めてオンラインでチューリップを購入しましたが、感心しました。閉じた状態で届き、2日間で美しく咲きました。', '4.5'),
        ('FLR003', 'weekly_flower', '毎週これを買っています。失望したことは一度もない。バリエーションが豊富で、季節感を常に感じられます。', '5.0'),

        ('FLR004', 'luxury_buyer', 'この蘭のアレンジメントは純粋な贅沢。セラミック鉢が美しく、蘭は絵のように見えます。値段の価値あり。', '5.0'),
        ('FLR004', 'plant_parent', 'この蘭の鉢を3ヶ月間育てていますが、まだ咲いています!非常に丈夫でエレガント。説明が役に立ちました。', '4.5'),
        ('FLR004', 'corporate_gift', 'VIPクライアントに送ったところ、非常に感銘を受けました。プレゼンテーションはプレミアムで、蘭は絶妙です。', '5.0'),
        ('FLR004', 'home_office', 'ホームオフィスに洗練された雰囲気を加えます。白い蘭と鉢のコントラストが素晴らしい。手入れも簡単。', '4.5'),
        ('FLR004', 'special_occasion', '母の60歳の誕生日に購入。母はいつも話しています。1ヶ月経った今も蘭は元気です。', '5.0'),

        ('FLR005', 'sunshine_seeker', 'これらのひまわりは純粋な太陽!すぐにどの部屋も明るくします。配達は完璧で、届いたらもう開いていました。', '5.0'),
        ('FLR005', 'kid_approved', '娘の部屋に購入。娘は大喜び。如此 cheerful で楽しい。十代の若者への素晴らしいギフト。', '4.5'),
        ('FLR005', 'summer_party', '夏のバーベキューの装飾に使用。誰もがその美しさについてコメントしました。とても festive でファームハウスシック。', '4.0'),
        ('FLR005', 'mood_booster', '気持ちが落ち込んだ時、このボックスを注文します。ひまわりが如此 cheerful で、すぐに気分を改善してくれます。配達も迅速。', '5.0'),
        ('FLR005', 'dried_flower_fan', '乾燥させた後も、これらのひまわりは美しく見えました。ヶ月間、ドライフラワーの装飾として保管。信じられないほどの耐久性。', '4.5');

    -- Product Catalog Service: create a schema
    CREATE SCHEMA catalog;
    GRANT USAGE ON SCHEMA catalog TO otelu;

    -- Product Catalog Service: create tables
    CREATE TABLE catalog.products (
        id TEXT PRIMARY KEY,
        name TEXT NOT NULL,
        description TEXT,
        picture TEXT,
        price_currency_code TEXT NOT NULL,
        price_units BIGINT NOT NULL,
        price_nanos INT NOT NULL,
        categories TEXT
    );

    -- Product Catalog Service: grant permission to schema
    GRANT SELECT ON ALL TABLES IN SCHEMA catalog TO otelu;

    -- Product Catalog Service: add product data
    INSERT INTO catalog.products (id, name, description, picture, price_currency_code, price_units, price_nanos, categories)
    VALUES
        ('FLR001', '赤いバラの花束', 'ユーカリとカスミソウで手結びした、12本の長茎プレミアム赤いバラ。ロマンチックな場面、記念日、または単に「愛している」を伝えるのに最適。各バラはベルベットのような花びらと深い深紅の色合いのために厳選され、特徴的な包装でアレンジされています。', 'RedRosesBouquet.jpg', 'JPY', 4500, 0, 'flowers'),
        ('FLR002', '白いユリのアレンジメント', '洗練されたガラス花瓶に置かれた、純白のオリエンタルユリのアレンジメント。繊細な香りがどの部屋にも静けさをもたらします。結婚式、弔意、洗練されたホームデコレーションに最適。各茎には3〜5つの大きなトランペット型の花が咲きます。', 'WhiteLiliesArrangement.png', 'JPY', 5200, 0, 'flowers'),
        ('FLR003', '春のチューリップミックス', 'ピンク、黄色、柔らかな紫の季節限定チューリップの鮮やかなミックス。これらの cheerful な花は、新しい始まり、誕生日のお祝い、またはワークスペースを明るくするのに最適です。つぼみの状態で届くので、満開の美しさへと開いていくのを楽しめます。', 'SpringTulipMix.png', 'JPY', 3000, 0, 'flowers'),
        ('FLR004', 'エレガントな蘭の鉢植え', 'プレミアムな白いセラミック鉢に飾られた、見事な胡蝶蘭。最小限の手入れで何ヶ月も咲き誇るこの長続きする美しさ。各鉢には8〜12の花を持つ2本の成熟した蘭の茎が含まれており、洗練された雰囲気を醸し出す印象的なセンターピースを作り出します。', 'OrchidElegancePot.jpg', 'JPY', 7500, 0, 'flowers,premium'),
        ('FLR005', 'ひまわりのサンシャインボックス', '特徴的なサンシャインボックスに、緑の葉とクリサンセマムと共にアレンジされた5本の大胆なひまわり。これらの輝く花は確実に笑顔をもたらします。明るい黄金色の花びらと暗い中心部が、どんな場面でも瞬時に気分を高めてくれます。', 'SunflowerSunshineBox.jpg', 'JPY', 3800, 0, 'flowers');
