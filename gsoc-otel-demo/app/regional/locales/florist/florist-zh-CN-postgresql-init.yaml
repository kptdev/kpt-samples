apiVersion: v1
kind: ConfigMap
metadata:
  name: florist-zh-cn-postgresql-init
  annotations:
    config.kubernetes.io/local-config: "true"
  namespace: otel-demo
data:
  init.sql: |
    -- Copyright The OpenTelemetry Authors
    -- SPDX-License-Identifier: Apache-2.0

    CREATE USER otelu WITH PASSWORD 'otelp';

    -- Accounting Service: create a schema
    CREATE SCHEMA accounting;
    GRANT USAGE ON SCHEMA accounting TO otelu;

    -- Accounting Service: create tables
    CREATE TABLE accounting."order" (
        order_id TEXT PRIMARY KEY
    );

    CREATE TABLE accounting.shipping (
        shipping_tracking_id TEXT PRIMARY KEY,
        shipping_cost_currency_code TEXT NOT NULL,
        shipping_cost_units BIGINT NOT NULL,
        shipping_cost_nanos INT NOT NULL,
        street_address TEXT,
        city TEXT,
        state TEXT,
        country TEXT,
        zip_code TEXT,
        order_id TEXT NOT NULL,
        FOREIGN KEY (order_id) REFERENCES accounting."order"(order_id) ON DELETE CASCADE
    );

    CREATE TABLE accounting.orderitem (
        item_cost_currency_code TEXT NOT NULL,
        item_cost_units BIGINT NOT NULL,
        item_cost_nanos INT NOT NULL,
        product_id TEXT NOT NULL,
        quantity INT NOT NULL,
        order_id TEXT NOT NULL,
        PRIMARY KEY (order_id, product_id),
        FOREIGN KEY (order_id) REFERENCES accounting."order"(order_id) ON DELETE CASCADE
    );

    -- Accounting Service: grant permission to schema
    GRANT SELECT, INSERT, UPDATE ON ALL TABLES IN SCHEMA accounting TO otelu;

    -- Product Review Service: create a schema
    CREATE SCHEMA reviews;
    GRANT USAGE ON SCHEMA reviews TO otelu;

    -- Product Review Service: create tables
    CREATE TABLE reviews.productreviews (
        id INTEGER GENERATED BY DEFAULT AS IDENTITY PRIMARY KEY,
        product_id VARCHAR(16) NOT NULL,
        username VARCHAR(64) NOT NULL,
        description VARCHAR(1024),
        score NUMERIC(2,1) NOT NULL
    );

    -- Product Review Service: create index for product_id lookups
    CREATE INDEX product_id_index ON reviews.productreviews (product_id);

    -- Product Review Service: grant permission to schema
    GRANT SELECT, INSERT, UPDATE ON ALL TABLES IN SCHEMA reviews TO otelu;

    -- Product Review Service:  add product review data
    INSERT INTO reviews.productreviews (product_id, username, description, score)
    VALUES
        ('FLR001', 'flower_lover', '这些红玫瑰太惊艳了!送达时新鲜鲜艳,花束保持了一个多星期。非常适合周年纪念。', '5.0'),
        ('FLR001', 'romantic_guy', '情人节订的,伴侣欣喜若狂。香气充满整个房间。强烈推荐用于任何浪漫场合。', '4.5'),
        ('FLR001', 'gift_giver', '包装精美,玫瑰盛开中。是很棒的生日礼物。一定会再下单。', '4.5'),
        ('FLR001', 'home_decorator', '深红色和图片上完全一样。为我的客厅增添了优雅。新鲜度保证是真的。', '4.0'),
        ('FLR001', 'repeat_buyer', '第三次订购这个花束。每次品质如一。玫瑰总是长茎且华丽。', '5.0'),

        ('FLR002', 'minimalist_fan', '白百合纯净优雅。淡淡的香味如天堂般美好而不过于浓郁。非常适合现代装饰。', '5.0'),
        ('FLR002', 'sympathy_sender', '送给一位悲伤的朋友。纯净的白百合带来了安慰与平和。布置精致而庄重。', '4.5'),
        ('FLR002', 'scent_enthusiast', '如果你喜爱天然花香,这些百合是梦想。多天来为我的走廊充满神圣的芬芳。', '4.5'),
        ('FLR002', 'wedding_planner', '用于新娘送礼会的中心装饰。每个人都在问我是从哪里买的。百合在当晚美丽地绽放。', '5.0'),
        ('FLR002', 'office_buyer', '为我们的前台订购。专业、优雅且持久。物超所值。', '4.0'),

        ('FLR003', 'spring_fan', '这些郁金香充满春意!明亮欢快的色彩立即提振我的心情。搭配非常多样。', '5.0'),
        ('FLR003', 'budget_buyer', '性价比超高。郁金香很新鲜,持续了近10天。是给自己的一份可爱实惠的小礼物。', '4.0'),
        ('FLR003', 'color_lover', '喜爱粉色、黄色和紫色郁金香的组合。营造出如此欢乐的中心装饰。与网站上展示的一模一样。', '4.5'),
        ('FLR003', 'garden_newbie', '第一次在网上购买郁金香,印象很好。送达时紧闭,两天内美丽绽放。', '4.5'),
        ('FLR003', 'weekly_flower', '我每周都买这些。从不让人失望。多样性让一切保持新鲜,总是充满季节感。', '5.0'),

        ('FLR004', 'luxury_buyer', '这个兰花布置是纯粹的奢华。陶瓷盆很漂亮,兰花看起来像一幅画。物有所值。', '5.0'),
        ('FLR004', 'plant_parent', '这个兰花盆我已经养了三个月,仍在绽放!极其坚韧优雅。说明很有帮助。', '4.5'),
        ('FLR004', 'corporate_gift', '送给一位VIP客户,他们深受打动。展示是高级的,兰花精美绝伦。', '5.0'),
        ('FLR004', 'home_office', '为我的家庭办公室增添如此精致感。白兰花与花盆相映生辉。也非常易于打理。', '4.5'),
        ('FLR004', 'special_occasion', '为我母亲的60岁生日购买。她一直在谈论它。兰花一个月后仍然生机勃勃。', '5.0'),

        ('FLR005', 'sunshine_seeker', '这些向日葵就是纯粹的阳光!立即点亮任何房间。送货完美,送达时已经开放。', '5.0'),
        ('FLR005', 'kid_approved', '给我女儿的房间买的,她非常喜欢。如此欢快有趣。是青少年的好礼物。', '4.5'),
        ('FLR005', 'summer_party', '用于夏季烧烤装饰。每个人都评论它们多么华丽。非常喜庆且乡村时尚。', '4.0'),
        ('FLR005', 'mood_booster', '每当我感到沮丧,我就订购这个盒子。向日葵如此欢快,瞬间提升心情。送货也很快。', '5.0'),
        ('FLR005', 'dried_flower_fan', '即使干燥后,这些向日葵看起来仍然很美。我把它们作为干花装饰保留了好几个月。令人难以置信的耐久性。', '4.5');

    -- Product Catalog Service: create a schema
    CREATE SCHEMA catalog;
    GRANT USAGE ON SCHEMA catalog TO otelu;

    -- Product Catalog Service: create tables
    CREATE TABLE catalog.products (
        id TEXT PRIMARY KEY,
        name TEXT NOT NULL,
        description TEXT,
        picture TEXT,
        price_currency_code TEXT NOT NULL,
        price_units BIGINT NOT NULL,
        price_nanos INT NOT NULL,
        categories TEXT
    );

    -- Product Catalog Service: grant permission to schema
    GRANT SELECT ON ALL TABLES IN SCHEMA catalog TO otelu;

    -- Product Catalog Service: add product data
    INSERT INTO catalog.products (id, name, description, picture, price_currency_code, price_units, price_nanos, categories)
    VALUES
        ('FLR001', '红玫瑰花束', '一打优质长茎红玫瑰,手工搭配桉树叶和满天星扎束。非常适合浪漫场合、周年纪念或仅仅表达"我爱你"。每朵玫瑰都经过精心挑选,拥有丝绒般的花瓣和深红色的色调,然后以我们标志性的包装布置。', 'RedRosesBouquet.jpg', 'CNY', 199, 900000000, 'flowers'),
        ('FLR002', '白百合布置', '一束纯白东方百合,安置在优雅的玻璃花瓶中。它们细腻的香气为任何房间注入宁静。非常适合婚礼、慰问或精致的家居装饰。每根花茎有3-5朵大型喇叭形花朵。', 'WhiteLiliesArrangement.png', 'CNY', 239, 0, 'flowers'),
        ('FLR003', '春季郁金香混合', '一束充满活力的季节性郁金香,有粉色、黄色和柔和的紫色。这些欢快的花朵非常适合庆祝新的开始、生日或照亮你的工作空间。以花蕾形式送达,让你可以观赏它们绽放成完整的美丽。', 'SpringTulipMix.png', 'CNY', 139, 0, 'flowers'),
        ('FLR004', '优雅兰花盆栽', '一株惊艳的蝴蝶兰展示于优质白色陶瓷盆中。这种持久的美丽只需极少照料便可绽放数月。每盆含有两株成熟的兰花茎,有8-12朵花,创造出引人注目的中心装饰,散发着精致感。', 'OrchidElegancePot.jpg', 'CNY', 359, 0, 'flowers,premium'),
        ('FLR005', '向日葵阳光盒', '五朵醒目的向日葵与我们标志性的阳光盒中的绿叶和纽扣花搭配布置。这些光芒四射的花朵保证带来微笑。欢快的金色花瓣和深色花心为任何场合创造即时的情绪提升。', 'SunflowerSunshineBox.jpg', 'CNY', 169, 0, 'flowers');
