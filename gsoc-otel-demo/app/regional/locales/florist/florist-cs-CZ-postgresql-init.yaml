apiVersion: v1
kind: ConfigMap
metadata:
  name: florist-cs-cz-postgresql-init
  annotations:
    config.kubernetes.io/local-config: "true"
  namespace: otel-demo
data:
  init.sql: |
    -- Copyright The OpenTelemetry Authors
    -- SPDX-License-Identifier: Apache-2.0

    CREATE USER otelu WITH PASSWORD 'otelp';

    -- Accounting Service: create a schema
    CREATE SCHEMA accounting;
    GRANT USAGE ON SCHEMA accounting TO otelu;

    -- Accounting Service: create tables
    CREATE TABLE accounting."order" (
        order_id TEXT PRIMARY KEY
    );

    CREATE TABLE accounting.shipping (
        shipping_tracking_id TEXT PRIMARY KEY,
        shipping_cost_currency_code TEXT NOT NULL,
        shipping_cost_units BIGINT NOT NULL,
        shipping_cost_nanos INT NOT NULL,
        street_address TEXT,
        city TEXT,
        state TEXT,
        country TEXT,
        zip_code TEXT,
        order_id TEXT NOT NULL,
        FOREIGN KEY (order_id) REFERENCES accounting."order"(order_id) ON DELETE CASCADE
    );

    CREATE TABLE accounting.orderitem (
        item_cost_currency_code TEXT NOT NULL,
        item_cost_units BIGINT NOT NULL,
        item_cost_nanos INT NOT NULL,
        product_id TEXT NOT NULL,
        quantity INT NOT NULL,
        order_id TEXT NOT NULL,
        PRIMARY KEY (order_id, product_id),
        FOREIGN KEY (order_id) REFERENCES accounting."order"(order_id) ON DELETE CASCADE
    );

    -- Accounting Service: grant permission to schema
    GRANT SELECT, INSERT, UPDATE ON ALL TABLES IN SCHEMA accounting TO otelu;

    -- Product Review Service: create a schema
    CREATE SCHEMA reviews;
    GRANT USAGE ON SCHEMA reviews TO otelu;

    -- Product Review Service: create tables
    CREATE TABLE reviews.productreviews (
        id INTEGER GENERATED BY DEFAULT AS IDENTITY PRIMARY KEY,
        product_id VARCHAR(16) NOT NULL,
        username VARCHAR(64) NOT NULL,
        description VARCHAR(1024),
        score NUMERIC(2,1) NOT NULL
    );

    -- Product Review Service: create index for product_id lookups
    CREATE INDEX product_id_index ON reviews.productreviews (product_id);

    -- Product Review Service: grant permission to schema
    GRANT SELECT, INSERT, UPDATE ON ALL TABLES IN SCHEMA reviews TO otelu;

    -- Product Review Service:  add product review data
    INSERT INTO reviews.productreviews (product_id, username, description, score)
    VALUES
        ('FLR001', 'flower_lover', 'Ty červené růže byly naprosto úžasné! Dorazily čerstvé a zářivé a kytice vydržela přes týden. Ideální na výročí.', '5.0'),
        ('FLR001', 'romantic_guy', 'Objednal jsem je na Valentýna a partnerka byla nadšená. Vůně naplnila celý pokoj. Vřele doporučuji pro jakoukoli romantickou příležitost.', '4.5'),
        ('FLR001', 'gift_giver', 'Krásné balení a růže byly v plném květu. Skvělý narozeninový dárek. Určitě objednám znovu.', '4.5'),
        ('FLR001', 'home_decorator', 'Sytě červená barva byla přesně jako na obrázku. Dodala mému obývacímu pokoji eleganci. Záruka čerstvosti funguje.', '4.0'),
        ('FLR001', 'repeat_buyer', 'Potřetí objednávám tuto kytici. Pokaždé stejná kvalita. Růže jsou vždy dlouze stonkované a nádherné.', '5.0'),

        ('FLR002', 'minimalist_fan', 'Bílé lilie byly čistá elegance. Jejich jemná vůně je božská a nepřehlušuje prostor. Ideální pro moderní interiér.', '5.0'),
        ('FLR002', 'sympathy_sender', 'Poslal jsem je truchlícímu příteli. Čistě bílé lilie přinesly útěchu a klid. Aranžmá bylo vkusné a důstojné.', '4.5'),
        ('FLR002', 'scent_enthusiast', 'Milujete-li přírodní květinové vůně, tyto lilie jsou splněný sen. Na dny naplnily chodbu božskou vůní.', '4.5'),
        ('FLR002', 'wedding_planner', 'Použila jsem je na svatební sprchovou dekoraci. Všichni se ptali, kde jsem je koupila. Lilie se krásně otevřely během večera.', '5.0'),
        ('FLR002', 'office_buyer', 'Objednáno na recepci. Profesionální, elegantní a dlouho vydrží. Skvělý poměr ceny a kvality.', '4.0'),

        ('FLR003', 'spring_fan', 'Tyto tulipány křičí jaro! Jasné, veselé barvy, které mi okamžitě zvedly náladu. Skvělá kombinace ve směsi.', '5.0'),
        ('FLR003', 'budget_buyer', 'Za tu cenu skvělá hodnota. Tulipány byly čerstvé a vydržely téměř 10 dní. Příjemný cenově dostupný dárek pro sebe.', '4.0'),
        ('FLR003', 'color_lover', 'Miluji směs růžových, žlutých a fialových tulipánů. Vytvořily takovou radostnou dekoraci. Přesně jako na webu.', '4.5'),
        ('FLR003', 'garden_newbie', 'Poprvé jsem objednávala tulipány online a byla jsem ohromená. Dorazily zavřené a během dvou dní krásně vykvetly.', '4.5'),
        ('FLR003', 'weekly_flower', 'Kupuji je každý týden. Nikdy nezklamou. Různorodost udržuje věci zajímavé a vždy působí sezónně.', '5.0'),

        ('FLR004', 'luxury_buyer', 'Tato orchidej je čistý luxus. Keramický květináč je nádherný a orchideje vypadají jako obraz. Stojí za každou korunu.', '5.0'),
        ('FLR004', 'plant_parent', 'Mám tento květináč tři měsíce a stále kvete! Mimořádně odolná a elegantní. Pokyny byly užitečné.', '4.5'),
        ('FLR004', 'corporate_gift', 'Poslal jsem to VIP klientovi a byl nesmírně ohromen. Prezentace je prémiová a orchideje jsou vynikající.', '5.0'),
        ('FLR004', 'home_office', 'Dodává mé domácí kanceláři sofistikovanost. Bílé orchideje v květináči jsou úchvatné. Také nenáročné na údržbu.', '4.5'),
        ('FLR004', 'special_occasion', 'Koupeno na matčiny 60. narozeniny. Stále o tom mluví. Orchideje jsou po měsíci stále silné.', '5.0'),

        ('FLR005', 'sunshine_seeker', 'Tyto slunečnice jsou čisté slunce! Okamžitě prosvětlí jakoukoli místnost. Doručení bylo perfektní a už byly otevřené.', '5.0'),
        ('FLR005', 'kid_approved', 'Koupil jsem je do dceřina pokoje a naprosto je miluje. Tak veselé a zábavné. Skvělý dárek pro teenagery.', '4.5'),
        ('FLR005', 'summer_party', 'Použil jsem je na letní BBQ dekoraci. Všichni komentovali, jak nádherné jsou. Velmi slavnostní a farmářsky elegantní.', '4.0'),
        ('FLR005', 'mood_booster', 'Kdykoli se cítím špatně, objednám si tuto krabici. Slunečnice jsou tak veselé, že okamžitě zlepší náladu. Také rychlé doručení.', '5.0'),
        ('FLR005', 'dried_flower_fan', 'I po usušení tyto slunečnice vypadaly krásně. Nechal jsem je jako sušenou dekoraci na měsíce. Neuvěřitelná trvanlivost.', '4.5');

    -- Product Catalog Service: create a schema
    CREATE SCHEMA catalog;
    GRANT USAGE ON SCHEMA catalog TO otelu;

    -- Product Catalog Service: create tables
    CREATE TABLE catalog.products (
        id TEXT PRIMARY KEY,
        name TEXT NOT NULL,
        description TEXT,
        picture TEXT,
        price_currency_code TEXT NOT NULL,
        price_units BIGINT NOT NULL,
        price_nanos INT NOT NULL,
        categories TEXT
    );

    -- Product Catalog Service: grant permission to schema
    GRANT SELECT ON ALL TABLES IN SCHEMA catalog TO otelu;

    -- Product Catalog Service: add product data
    INSERT INTO catalog.products (id, name, description, picture, price_currency_code, price_units, price_nanos, categories)
    VALUES
        ('FLR001', 'Kytice červených růží', 'Tucet prémiových dlouze stonkovaných červených růží ručně svázaných s eukalyptem a nevěstiným závojem. Ideální pro romantické příležitosti, výročí nebo jednoduše pro vyjádření "miluji tě". Každá růže je pečlivě vybrána pro své sametové lístky a sytě rudý odstín, pak naaranžována v našem signature balení.', 'RedRosesBouquet.jpg', 'CZK', 699, 0, 'flowers'),
        ('FLR002', 'Aranžmá bílých lilií', 'Elegantní aranžmá čistě bílých orientálních lilií ve štíhlé skleněné váze. Jejich jemná vůně naplní každou místnost klidem. Ideální na svatby, kondolence nebo sofistikovaný domácí interiér. Každá stonek nese 3-5 velkých trumpetových květů.', 'WhiteLiliesArrangement.png', 'CZK', 799, 0, 'flowers'),
        ('FLR003', 'Jarní směs tulipánů', 'Živá směs sezónních tulipánů v růžové, žluté a jemně fialové. Tyto veselé květiny jsou ideální pro oslavu nových začátků, narozeniny nebo rozjasnění pracovního prostoru. Dodávány v poupatech, abyste mohli sledovat jejich rozvíjení do plné krásy.', 'SpringTulipMix.png', 'CZK', 499, 0, 'flowers'),
        ('FLR004', 'Elegantní orchidej v květináči', 'Ohromující phalaenopsis orchidej v prémiovém bílém keramickém květináči. Tato dlouhotrvající krása kvete měsíce s minimální péčí. Každý květináč obsahuje dvě zralé stonky orchideje s 8-12 květy, vytvářející poutavou dekoraci vyzařující sofistikovanost.', 'OrchidElegancePot.jpg', 'CZK', 1199, 0, 'flowers,premium'),
        ('FLR005', 'Slunečnicové sluneční box', 'Pět výrazných slunečnic naaranžovaných se zelení a knoflíkovými květy v naší signature sluneční krabici. Tyto zářivé květiny zaručeně vykouzlí úsměv. Veselé zlaté lístky a tmavá středy vytvářejí okamžitý povzbuďák nálady pro každou příležitost.', 'SunflowerSunshineBox.jpg', 'CZK', 599, 0, 'flowers');
