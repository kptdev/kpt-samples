apiVersion: v1
kind: ConfigMap
metadata:
  name: florist-hi-IN-postgresql-init
  annotations:
    config.kubernetes.io/local-config: "true"
  namespace: otel-demo
data:
  init.sql: |
    -- Copyright The OpenTelemetry Authors
    -- SPDX-License-Identifier: Apache-2.0

    CREATE USER otelu WITH PASSWORD 'otelp';

    -- लेखा सेवा: एक स्कीमा बनाएं
    CREATE SCHEMA accounting;
    GRANT USAGE ON SCHEMA accounting TO otelu;

    -- लेखा सेवा: टेबल बनाएं
    CREATE TABLE accounting."order" (
        order_id TEXT PRIMARY KEY
    );

    CREATE TABLE accounting.shipping (
        shipping_tracking_id TEXT PRIMARY KEY,
        shipping_cost_currency_code TEXT NOT NULL,
        shipping_cost_units BIGINT NOT NULL,
        shipping_cost_nanos INT NOT NULL,
        street_address TEXT,
        city TEXT,
        state TEXT,
        country TEXT,
        zip_code TEXT,
        order_id TEXT NOT NULL,
        FOREIGN KEY (order_id) REFERENCES accounting."order"(order_id) ON DELETE CASCADE
    );

    CREATE TABLE accounting.orderitem (
        item_cost_currency_code TEXT NOT NULL,
        item_cost_units BIGINT NOT NULL,
        item_cost_nanos INT NOT NULL,
        product_id TEXT NOT NULL,
        quantity INT NOT NULL,
        order_id TEXT NOT NULL,
        PRIMARY KEY (order_id, product_id),
        FOREIGN KEY (order_id) REFERENCES accounting."order"(order_id) ON DELETE CASCADE
    );

    -- लेखा सेवा: स्कीमा पर अनुमति दें
    GRANT SELECT, INSERT, UPDATE ON ALL TABLES IN SCHEMA accounting TO otelu;

    -- उत्पाद समीक्षा सेवा: एक स्कीमा बनाएं
    CREATE SCHEMA reviews;
    GRANT USAGE ON SCHEMA reviews TO otelu;

    -- उत्पाद समीक्षा सेवा: टेबल बनाएं
    CREATE TABLE reviews.productreviews (
        id INTEGER GENERATED BY DEFAULT AS IDENTITY PRIMARY KEY,
        product_id VARCHAR(16) NOT NULL,
        username VARCHAR(64) NOT NULL,
        description VARCHAR(1024),
        score NUMERIC(2,1) NOT NULL
    );

    -- उत्पाद समीक्षा सेवा: product_id लुकअप के लिए इंडेक्स बनाएं
    CREATE INDEX product_id_index ON reviews.productreviews (product_id);

    -- उत्पाद समीक्षा सेवा: स्कीमा पर अनुमति दें
    GRANT SELECT, INSERT, UPDATE ON ALL TABLES IN SCHEMA reviews TO otelu;

    -- उत्पाद समीक्षा सेवा: उत्पाद समीक्षा डेटा जोड़ें
    INSERT INTO reviews.productreviews (product_id, username, description, score)
    VALUES
        ('FLR001', 'flower_lover', 'ये लाल गुलाब बिल्कुल शानदार थे! वे ताज़ा और जीवंत हालत में आए, और गुलदस्ता एक सप्ताह से अधिक समय तक चला। सालगिरह के लिए बिल्कुल सही।', '5.0'),
        ('FLR001', 'romantic_guy', 'वैलेंटाइन डे के लिए ऑर्डर किया और मेरी पार्टनर बहुत खुश हुई। सुगंध से पूरा कमरा महक उठा। किसी भी रोमांटिक अवसर के लिए अत्यधिक सिफारिश।', '4.5'),
        ('FLR001', 'gift_giver', 'बेहतरीन पैकेजिंग और गुलाब पूरी तरह खिले हुए थे। जन्मदिन के लिए शानदार उपहार बना। निश्चित रूप से फिर से ऑर्डर करूंगा।', '4.5'),
        ('FLR001', 'home_decorator', 'गहरा लाल रंग बिल्कुल वैसा ही था जैसा तस्वीर में दिखाया गया था। मेरे लिविंग रूम में इतनी शान आ गई। ताज़गी की गारंटी सच है।', '4.0'),
        ('FLR001', 'repeat_buyer', 'इस गुलदस्ते का मेरा तीसरी बार ऑर्डर है। हर बार एक जैसी गुणवत्ता। गुलाब हमेशा लंबे तने वाले और शानदार होते हैं।', '5.0'),

        ('FLR002', 'minimalist_fan', 'सफेद लिली शुद्ध शान थीं। इनकी हल्की सुगंध स्वर्गीय है और अधिक भारी नहीं। आधुनिक सजावट के लिए बिल्कुल सही।', '5.0'),
        ('FLR002', 'sympathy_sender', 'एक दुखी मित्र को भेजा। शुद्ध सफेद लिली ने सुकून और शांति दी। व्यवस्था स्वादिष्ट और शालीन थी।', '4.5'),
        ('FLR002', 'scent_enthusiast', 'अगर आपको प्राकृतिक फूलों की सुगंध पसंद है, तो ये लिली एक सपना हैं। कई दिनों तक मेरे गलियारे को सबसे दिव्य सुगंध से भर दिया।', '4.5'),
        ('FLR002', 'wedding_planner', 'दुल्हन की शावर के सेंटरपीस के लिए इस्तेमाल किया। हर किसी ने पूछा कि ये कहाँ से लाई। लिली शाम के दौरान खूबसूरती से खिलीं।', '5.0'),
        ('FLR002', 'office_buyer', 'हमारे रिसेप्शन डेस्क के लिए ऑर्डर किया। पेशेवर, शानदार, और बहुत लंबे समय तक चलते हैं। गुणवत्ता के लिए बढ़िया मूल्य।', '4.0'),

        ('FLR003', 'spring_fan', 'ये ट्यूलिप बसंत की चीख हैं! चमकीले, खुशनुमा रंग जिन्होंने तुरंत मेरा मूड उठा दिया। मिश्रण में सही विविधता।', '5.0'),
        ('FLR003', 'budget_buyer', 'कीमत के लिए बढ़िया मूल्य। ट्यूलिप ताज़े थे और लगभग 10 दिन चले। अपने लिए एक प्यारी किफायती खुशी।', '4.0'),
        ('FLR003', 'color_lover', 'गुलाबी, पीले और बैंगनी ट्यूलिप का मिश्रण पसंद है। इतना खुशनुमा सेंटरपीस बनाया। वेबसाइट पर दिखाए गए अनुसार ही।', '4.5'),
        ('FLR003', 'garden_newbie', 'पहली बार ऑनलाइन ट्यूलिप खरीदी और प्रभावित हुआ। वे कसकर बंद हालत में आए और दो दिनों में खूबसूरती से खिले।', '4.5'),
        ('FLR003', 'weekly_flower', 'मैं हर हफ्ते ये खरीदता हूं। कभी निराश नहीं करते। विविधता चीज़ों को रोचक रखती है और वे हमेशा मौसमी लगते हैं।', '5.0'),

        ('FLR004', 'luxury_buyer', 'यह ऑर्किड व्यवस्था शुद्ध विलासिता है। सिरेमिक गमला सुंदर है और ऑर्किड तस्वीर जैसे दिखते हैं। हर पैसे के लायक।', '5.0'),
        ('FLR004', 'plant_parent', 'मेरे पास यह ऑर्किड गमला तीन महीने से है और अभी भी खिल रहा है! अत्यंत मजबूत और शानदार। निर्देश सहायक थे।', '4.5'),
        ('FLR004', 'corporate_gift', 'एक वीआईपी ग्राहक को भेजा और वे बेहद प्रभावित हुए। प्रस्तुति प्रीमियम है और ऑर्किड उत्कृष्ट हैं।', '5.0'),
        ('FLR004', 'home_office', 'मेरे होम ऑफिस में इतनी बारीकी जोड़ता है। गमले के खिलाफ सफेद ऑर्किड शानदार हैं। रखरखाव भी कम है।', '4.5'),
        ('FLR004', 'special_occasion', 'अपनी माँ के 60वें जन्मदिन के लिए खरीदा। वे इसे लेकर बात करना नहीं रोक रहीं। एक महीने बाद भी ऑर्किड मजबूत हैं।', '5.0'),

        ('FLR005', 'sunshine_seeker', 'ये सूरजमुखी शुद्ध धूप हैं! वे तुरंत किसी भी कमरे को रोशन कर देते हैं। डिलीवरी बढ़िया थी और वे पहले से खुले हुए थे।', '5.0'),
        ('FLR005', 'kid_approved', 'अपनी बेटी के कमरे के लिए खरीदे और वे उन्हें बहुत पसंद आए। बहुत खुशनुमा और मज़ेदार। किशोरों के लिए बढ़िया उपहार।', '4.5'),
        ('FLR005', 'summer_party', 'ग्रीष्मकालीन बीबीक्यू सजावट के लिए इस्तेमाल किया। हर किसी ने इस बात पर टिप्पणी की कि वे कितने शानदार थे। बहुत उत्सवपूर्ण और फार्महाउस-चिक।', '4.0'),
        ('FLR005', 'mood_booster', 'जब भी मैं उदास महसूस करता हूं, मैं यह बॉक्स ऑर्डर करता हूं। सूरजमुखी इतने खुशनुमा हैं कि तुरंत मेरा मूड सुधार देते हैं। डिलीवरी भी तेज़।', '5.0'),
        ('FLR005', 'dried_flower_fan', 'सूखने के बाद भी, ये सूरजमुखी सुंदर दिखते थे। मैंने इन्हें महीनों तक सूखी सजावट के रूप में रखा। अविश्वसनीय दीर्घायु।', '4.5');

    -- उत्पाद कैटलॉग सेवा: एक स्कीमा बनाएं
    CREATE SCHEMA catalog;
    GRANT USAGE ON SCHEMA catalog TO otelu;

    -- उत्पाद कैटलॉग सेवा: टेबल बनाएं
    CREATE TABLE catalog.products (
        id TEXT PRIMARY KEY,
        name TEXT NOT NULL,
        description TEXT,
        picture TEXT,
        price_currency_code TEXT NOT NULL,
        price_units BIGINT NOT NULL,
        price_nanos INT NOT NULL,
        categories TEXT
    );

    -- उत्पाद कैटलॉग सेवा: स्कीमा पर अनुमति दें
    GRANT SELECT ON ALL TABLES IN SCHEMA catalog TO otelu;

    -- उत्पाद कैटलॉग सेवा: उत्पाद डेटा जोड़ें
    INSERT INTO catalog.products (id, name, description, picture, price_currency_code, price_units, price_nanos, categories)
    VALUES
        ('FLR001', 'लाल गुलाब का गुलदस्ता', 'यूकेलिप्टस और बेबीज़ ब्रीथ के साथ हाथ से बंधी एक दर्जन लंबे तने वाले प्रीमियम लाल गुलाब। रोमांटिक अवसरों, सालगिरह, या बस "मैं तुमसे प्यार करता हूं" कहने के लिए बिल्कुल सही। प्रत्येक गुलाब को इसके मखमली पंखुड़ियों और समृद्ध लाल रंग के लिए सावधानीपूर्वक चुना जाता है, फिर हमारे हस्ताक्षर रैपिंग में व्यवस्थित किया जाता है।', 'RedRosesBouquet.jpg', 'INR', 2499, 0, 'flowers'),
        ('FLR002', 'सफेद लिली की व्यवस्था', 'एक चिकने कांच के फूलदान में बसे शुद्ध सफेद ओरिएंटल लिली की शानदार व्यवस्था। उनकी नाजुक सुगंध किसी भी कमरे को शांति से भर देती है। शादी, सहानुभूति संदेश, या परिष्कृत घरेलू सजावट के लिए आदर्श। प्रत्येक तने में 3-5 बड़े ट्रम्पेट खिले होते हैं।', 'WhiteLiliesArrangement.png', 'INR', 2999, 0, 'flowers'),
        ('FLR003', 'बसंत ट्यूलिप मिश्रण', 'गुलाबी, पीले और हल्के बैंगनी रंग में मौसमी ट्यूलिप का एक जीवंत मिश्रण। ये खुशनुमा खिलने नई शुरुआत, जन्मदिन मनाने, या आपके कार्यस्थल को उज्ज्वल करने के लिए बिल्कुल सही हैं। कली के रूप में वितरित किए जाते हैं ताकि आप उन्हें पूरी सुंदरता में खिलते हुए देख सकें।', 'SpringTulipMix.png', 'INR', 1799, 0, 'flowers'),
        ('FLR004', 'ऑर्किड शानदार गमला', 'एक प्रीमियम सफेद सिरेमिक गमले में प्रदर्शित एक आश्चर्यजनक फालेनोप्सिस ऑर्किड। यह लंबे समय तक चलने वाली सुंदरता न्यूनतम देखभाल के साथ महीनों तक खिलती है। प्रत्येक गमले में 8-12 खिलने वाले दो परिपक्व ऑर्किड तने होते हैं, जो एक आकर्षक केंद्रबिंदु बनाते हैं जो परिष्कार का अनुभव कराता है।', 'OrchidElegancePot.jpg', 'INR', 4299, 0, 'flowers,premium'),
        ('FLR005', 'सूरजमुखी धूप बॉक्स', 'हमारे हस्ताक्षर धूप बॉक्स में हरियाली और बिली बटन के साथ व्यवस्थित पांच बोल्ड सूरजमुखी। ये चमकदार खिलने मुस्कान लाने की गारंटी देते हैं। खुशनुमा सुनहरी पंखुड़ियाँ और गहरे केंद्र किसी भी अवसर के लिए तत्काल मूड लिफ्टर बनाते हैं।', 'SunflowerSunshineBox.jpg', 'INR', 2099, 0, 'flowers');
