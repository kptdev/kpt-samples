apiVersion: fn.kpt.dev/v1alpha1
kind: ApplyReplacements
metadata:
  name: replace-postgresql-region
  annotations:
    config.kubernetes.io/local-config: "true"
replacements:
  - source:
      kind: ConfigMap
      name: active-region-postgresql-init
      fieldPath: data.init\.sql
    targets:
      - select:
          kind: ConfigMap
          name: postgresql-init
        fieldPaths:
          - data.init\.sql
