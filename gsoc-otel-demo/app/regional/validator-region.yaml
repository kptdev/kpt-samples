apiVersion: fn.kpt.dev/v1alpha1
kind: StarlarkRun
metadata:
  name: validator-region
  annotations:
    config.kubernetes.io/local-config: "true"
source: |-
  def validate_region(ctx):
    for r in ctx.resource_list["items"]:
      if r.get("kind") == "ConfigMap" and r.get("metadata", {}).get("name") == "region-config":
        region = r.get("data", {}).get("region", "")
        valid_regions = ["us", "india", "czech-republic", "china", "japan"]
        if region not in valid_regions:
          fail("region '" + region + "' is invalid. Allowed values: us, india, czech-republic, china, japan")
    return

  validate_region(ctx)
