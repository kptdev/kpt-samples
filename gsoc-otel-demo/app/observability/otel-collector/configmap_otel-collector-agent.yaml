# Source: opentelemetry-demo/charts/opentelemetry-collector/templates/configmap-agent.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-agent
  labels:
    helm.sh/chart: opentelemetry-collector-0.153.0
    app.kubernetes.io/name: opentelemetry-collector
    app.kubernetes.io/instance: opentelemetry-demo
    app.kubernetes.io/version: 0.151.0
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/part-of: opentelemetry-collector
    app.kubernetes.io/component: agent-collector
  namespace: otel-demo
data:
  relay: "connectors:\n  spanmetrics: {}\nexporters:\n  debug: {}\n  opensearch:\n    http:\n      endpoint: http://opensearch:9200\n      tls:\n        insecure: true\n    logs_index: otel-logs\n    logs_index_time_format: yyyy-MM-dd\n  otlp/jaeger:\n    endpoint: jaeger:4317\n    sending_queue:\n      batch: {}\n    tls:\n      insecure: true\n  otlphttp/prometheus:\n    endpoint: http://prometheus:9090/api/v1/otlp\n    sending_queue:\n      batch: {}\n    tls:\n      insecure: true\nextensions:\n  health_check:\n    endpoint: ${env:MY_POD_IP}:13133\n  k8s_leader_elector/k8s_cluster:\n    auth_type: serviceAccount\n    lease_name: k8s.cluster.receiver.opentelemetry.io\n    lease_namespace: otel-demo \n  k8s_observer:\n    auth_type: serviceAccount\n    node: ${env:K8S_NODE_NAME}\nprocessors:\n  batch: {}\n  k8sattributes:\n    extract:\n      metadata:\n      - k8s.namespace.name\n      - k8s.pod.name\n      - k8s.pod.uid\n      - k8s.node.name\n      - k8s.pod.start_time\n      - k8s.deployment.name\n      - k8s.replicaset.name\n      - k8s.replicaset.uid\n      - k8s.daemonset.name\n      - k8s.daemonset.uid\n      - k8s.job.name\n      - k8s.job.uid\n      - k8s.container.name\n      - k8s.cronjob.name\n      - k8s.statefulset.name\n      - k8s.statefulset.uid\n      - container.image.tag\n      - container.image.name\n      - k8s.cluster.uid\n      - service.namespace\n      - service.name\n      - service.version\n      - service.instance.id\n      otel_annotations: true\n    filter:\n      node_from_env_var: K8S_NODE_NAME\n    passthrough: false\n    pod_association:\n    - sources:\n      - from: resource_attribute\n        name: k8s.pod.ip\n    - sources:\n      - from: resource_attribute\n        name: k8s.pod.uid\n    - sources:\n      - from: connection\n  memory_limiter:\n    check_interval: 5s\n    limit_percentage: 80\n    spike_limit_percentage: 25\n  resource:\n    attributes:\n    - action: insert\n      from_attribute: k8s.pod.uid\n      key: service.instance.id\n  resourcedetection:\n    detectors:\n    - env\n    - system\n  transform:\n    error_mode: ignore\n    trace_statements:\n    - conditions:\n      - span.kind == SPAN_KIND_SERVER and resource.attributes[\"service.name\"] == \"frontend\"\n        and span.attributes[\"http.route\"] == nil\n      context: span\n      statements:\n      - set(span.attributes[\"http.route\"], \"/api/cart\") where IsMatch(span.attributes[\"http.target\"],\n        \"\\\\/api\\\\/cart\")\n      - set(span.attributes[\"http.route\"], \"/api/checkout\") where IsMatch(span.attributes[\"http.target\"],\n        \"\\\\/api\\\\/checkout\")\n      - set(span.attributes[\"http.route\"], \"/api/products/{productId}\") where IsMatch(span.attributes[\"http.target\"],\n        \"\\\\/api\\\\/products\\\\/.*\")\n      - set(span.attributes[\"http.route\"], \"/api/recommendations\") where IsMatch(span.attributes[\"http.target\"],\n        \"\\\\/api\\\\/recommendations\")\n      - set(span.attributes[\"http.route\"], \"/api/data\") where IsMatch(span.attributes[\"http.target\"],\n        \"\\\\/api\\\\/data.*\")\n    - context: span\n      statements:\n      - set_semconv_span_name(\"1.37.0\", \"unsanitized_span_name\")\nreceivers:\n  hostmetrics:\n    collection_interval: 10s\n    root_path: /hostfs\n    scrapers:\n      cpu: null\n      disk: null\n      filesystem:\n        exclude_fs_types:\n          fs_types:\n          - autofs\n          - binfmt_misc\n          - bpf\n          - cgroup2\n          - configfs\n          - debugfs\n          - devpts\n          - devtmpfs\n          - fusectl\n          - hugetlbfs\n          - iso9660\n          - mqueue\n          - nsfs\n          - overlay\n          - proc\n          - procfs\n          - pstore\n          - rpc_pipefs\n          - securityfs\n          - selinuxfs\n          - squashfs\n          - sysfs\n          - tracefs\n          match_type: strict\n        exclude_mount_points:\n          match_type: regexp\n          mount_points:\n          - /dev/*\n          - /proc/*\n          - /sys/*\n          - /run/k3s/containerd/*\n          - /var/lib/docker/*\n          - /var/lib/kubelet/*\n          - /snap/*\n      load: null\n      memory: null\n      network: null\n  jaeger:\n    protocols:\n      grpc:\n        endpoint: ${env:MY_POD_IP}:14250\n      thrift_compact:\n        endpoint: ${env:MY_POD_IP}:6831\n      thrift_http:\n        endpoint: ${env:MY_POD_IP}:14268\n  k8s_cluster:\n    collection_interval: 10s\n    k8s_leader_elector: k8s_leader_elector/k8s_cluster\n  kafkametrics:\n    brokers:\n    - kafka:9092\n    collection_interval: 10s\n    scrapers:\n    - brokers\n    - topics\n    - consumers\n  kubeletstats:\n    auth_type: serviceAccount\n    collection_interval: 20s\n    endpoint: ${env:K8S_NODE_IP}:10250\n  otlp:\n    protocols:\n      grpc:\n        endpoint: ${env:MY_POD_IP}:4317\n      http:\n        cors:\n          allowed_origins:\n          - http://*\n          - https://*\n        endpoint: ${env:MY_POD_IP}:4318\n  prometheus:\n    config:\n      scrape_configs:\n      - job_name: opentelemetry-collector\n        scrape_interval: 10s\n        static_configs:\n        - targets:\n          - ${env:MY_POD_IP}:8888\n  receiver_creator/metrics:\n    discovery:\n      enabled: true\n    watch_observers:\n    - k8s_observer\n  zipkin:\n    endpoint: ${env:MY_POD_IP}:9411\nservice:\n  extensions:\n  - health_check\n  - k8s_observer\n  - k8s_leader_elector/k8s_cluster\n  pipelines:\n    logs:\n      exporters:\n      - opensearch\n      - debug\n      processors:\n      - k8sattributes\n      - memory_limiter\n      - resourcedetection\n      - resource\n      - batch\n      receivers:\n      - otlp\n    metrics:\n      exporters:\n      - otlphttp/prometheus\n      - debug\n      processors:\n      - k8sattributes\n      - memory_limiter\n      - resourcedetection\n      - resource\n      - batch\n      receivers:\n      - otlp\n      - kafkametrics\n      - spanmetrics\n      - receiver_creator/metrics\n      - hostmetrics\n      - kubeletstats\n      - k8s_cluster\n    traces:\n      exporters:\n      - otlp/jaeger\n      - debug\n      - spanmetrics\n      processors:\n      - k8sattributes\n      - memory_limiter\n      - resourcedetection\n      - resource\n      - transform\n      - batch\n      receivers:\n      - otlp\n      - jaeger\n      - zipkin\n  telemetry:\n    metrics:\n      level: detailed\n      readers:\n      - periodic:\n          exporter:\n            otlp:\n              endpoint: http://otel-collector:4318\n              insecure: true\n              protocol: http/protobuf\n          interval: 10000\n          timeout: 5000\n    resource:\n      host.name: ${env:OTEL_K8S_NODE_NAME}\n      k8s.namespace.name: ${env:OTEL_K8S_NAMESPACE}\n      k8s.node.ip: ${env:OTEL_K8S_NODE_IP}\n      k8s.node.name: ${env:OTEL_K8S_NODE_NAME}\n      k8s.pod.ip: ${env:OTEL_K8S_POD_IP}\n      k8s.pod.name: ${env:OTEL_K8S_POD_NAME}\n"
