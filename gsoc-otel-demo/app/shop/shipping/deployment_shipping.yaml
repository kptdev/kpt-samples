# Source: opentelemetry-demo/templates/component.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: shipping
  labels:
    helm.sh/chart: opentelemetry-demo-0.40.9
    opentelemetry.io/name: shipping
    app.kubernetes.io/version: 2.2.0
    app.kubernetes.io/component: shipping
    app.kubernetes.io/name: shipping
    app.kubernetes.io/part-of: opentelemetry-demo
    app.kubernetes.io/managed-by: Helm
  namespace: otel-demo
spec:
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      opentelemetry.io/name: shipping
  template:
    metadata:
      labels:
        opentelemetry.io/name: shipping
        app.kubernetes.io/version: 2.2.0
        app.kubernetes.io/component: shipping
        app.kubernetes.io/name: shipping
      annotations: {}
    spec:
      serviceAccountName: opentelemetry-demo
      containers:
        - name: shipping
          image: ghcr.io/open-telemetry/demo:2.2.0-shipping
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: service
          env:
            - name: OTEL_SERVICE_NAME
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: metadata.labels['app.kubernetes.io/component']
            - name: OTEL_COLLECTOR_NAME
              value: otel-collector
            - name: OTEL_EXPORTER_OTLP_METRICS_TEMPORALITY_PREFERENCE
              value: cumulative
            - name: SHIPPING_PORT
              value: "8080"
            - name: QUOTE_ADDR
              value: http://quote:8080
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://otel-collector:4317
            - name: IPV6_ENABLED
              value: "false"
            - name: OTEL_COLLECTOR_HOST
              value: otel-collector
            - name: GRAFANA_HOST
              value: grafana
            - name: JAEGER_HOST
              value: jaeger
          resources:
            limits:
              memory: 20Mi
          volumeMounts: null
      volumes: null
