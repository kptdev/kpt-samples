# Source: opentelemetry-demo/templates/component.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: recommendation
  labels:
    helm.sh/chart: opentelemetry-demo-0.40.9
    opentelemetry.io/name: recommendation
    app.kubernetes.io/version: 2.2.0
    app.kubernetes.io/component: recommendation
    app.kubernetes.io/name: recommendation
    app.kubernetes.io/part-of: opentelemetry-demo
    app.kubernetes.io/managed-by: Helm
  namespace: otel-demo
spec:
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      opentelemetry.io/name: recommendation
  template:
    metadata:
      labels:
        opentelemetry.io/name: recommendation
        app.kubernetes.io/version: 2.2.0
        app.kubernetes.io/component: recommendation
        app.kubernetes.io/name: recommendation
      annotations: {}
    spec:
      serviceAccountName: opentelemetry-demo
      containers:
        - name: recommendation
          image: ghcr.io/open-telemetry/demo:2.2.0-recommendation
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: service
          env:
            - name: OTEL_SERVICE_NAME
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: metadata.labels['app.kubernetes.io/component']
            - name: OTEL_COLLECTOR_NAME
              value: otel-collector
            - name: OTEL_EXPORTER_OTLP_METRICS_TEMPORALITY_PREFERENCE
              value: cumulative
            - name: RECOMMENDATION_PORT
              value: "8080"
            - name: PRODUCT_CATALOG_ADDR
              value: product-catalog:8080
            - name: OTEL_PYTHON_LOG_CORRELATION
              value: "true"
            - name: PROTOCOL_BUFFERS_PYTHON_IMPLEMENTATION
              value: python
            - name: FLAGD_HOST
              value: flagd
            - name: FLAGD_PORT
              value: "8013"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://otel-collector:4317
            - name: OTEL_COLLECTOR_HOST
              value: otel-collector
            - name: GRAFANA_HOST
              value: grafana
            - name: JAEGER_HOST
              value: jaeger
          resources:
            limits:
              memory: 500Mi
            requests: {}
          volumeMounts: null
      volumes: null
