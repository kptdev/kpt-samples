# Source: opentelemetry-demo/templates/component.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-catalog
  labels:
    helm.sh/chart: opentelemetry-demo-0.40.9
    opentelemetry.io/name: product-catalog
    app.kubernetes.io/version: 2.2.0
    app.kubernetes.io/component: product-catalog
    app.kubernetes.io/name: product-catalog
    app.kubernetes.io/part-of: opentelemetry-demo
    app.kubernetes.io/managed-by: Helm
  namespace: otel-demo
spec:
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      opentelemetry.io/name: product-catalog
  template:
    metadata:
      labels:
        opentelemetry.io/name: product-catalog
        app.kubernetes.io/version: 2.2.0
        app.kubernetes.io/component: product-catalog
        app.kubernetes.io/name: product-catalog
      annotations: {}
    spec:
      serviceAccountName: opentelemetry-demo
      containers:
        - name: product-catalog
          image: ghcr.io/open-telemetry/demo:2.2.0-product-catalog
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: service
          env:
            - name: OTEL_SERVICE_NAME
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: metadata.labels['app.kubernetes.io/component']
            - name: OTEL_COLLECTOR_NAME
              value: otel-collector
            - name: OTEL_EXPORTER_OTLP_METRICS_TEMPORALITY_PREFERENCE
              value: cumulative
            - name: PRODUCT_CATALOG_PORT
              value: "8080"
            - name: FLAGD_HOST
              value: flagd
            - name: FLAGD_PORT
              value: "8013"
            - name: GOMEMLIMIT
              value: 16MiB
            - name: DB_CONNECTION_STRING
              value: postgres://otelu:otelp@postgresql/otel?sslmode=disable
            - name: OTEL_SEMCONV_STABILITY_OPT_IN
              value: database
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://otel-collector:4317
            - name: OTEL_COLLECTOR_HOST
              value: otel-collector
            - name: GRAFANA_HOST
              value: grafana
            - name: JAEGER_HOST
              value: jaeger
          resources:
            limits:
              memory: 20Mi
          volumeMounts: null
      volumes: null
