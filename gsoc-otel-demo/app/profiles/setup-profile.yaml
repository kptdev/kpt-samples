apiVersion: fn.kpt.dev/v1alpha1
kind: StarlarkRun
metadata:
  name: setup-profile
  annotations:
    config.kubernetes.io/local-config: "true"
source: |
  load("krmfn.star", "krmfn")

  # === UPSTREAM DEFAULT RESOURCE VALUES ===
  # Extracted from opentelemetry-demo.yaml — the source of truth.
  # All profile scaling is computed from these baselines, never from
  # the current (possibly already-mutated) values in the YAML files.

  UPSTREAM_MEMORY_LIMITS = {
    # Shop — tier-1 (user-facing)
    "frontend": "250Mi",
    "frontend-proxy": "65Mi",
    # Shop — tier-2 (business-critical)
    "checkout": "100Mi",
    "cart": "160Mi",
    "payment": "140Mi",
    "product-catalog": "100Mi",
    # Shop — tier-3 (supporting)
    "shipping": "20Mi",
    "quote": "40Mi",
    "currency": "20Mi",
    "recommendation": "500Mi",
    "ad": "300Mi",
    "email": "100Mi",
    "accounting": "120Mi",
    "fraud-detection": "300Mi",
    "image-provider": "50Mi",
    "load-generator": "1500Mi",
    "product-reviews": "100Mi",
    # llm has no resource limits in upstream — omitted intentionally
    # Shop — infra
    "kafka": "700Mi",
    "postgresql": "100Mi",
    "flagd": "300Mi",
    "valkey-cart": "20Mi",
    # Observability — Deployments
    "grafana": "256Mi",
    "jaeger": "600Mi",
    "prometheus": "400Mi",
    # Observability — StatefulSet
    "opensearch": "1100Mi",
    # Observability — DaemonSet
    "otel-collector-agent": "200Mi",
  }

  # Only services that have memory requests in upstream
  UPSTREAM_MEMORY_REQUESTS = {
    "opensearch": "100Mi",
  }

  # Only services that have CPU limits in upstream
  UPSTREAM_CPU_LIMITS = {
    "grafana": "150m",
  }

  # Only services that have CPU requests in upstream
  UPSTREAM_CPU_REQUESTS = {
    "opensearch": "1000m",
  }

  def setup_profile(resources):
    profile = "medium"

    # Read profile from config
    for r in resources:
      if krmfn.match_gvk(r, "v1", "ConfigMap") and krmfn.match_name(r, "profile-config"):
        profile = r.get("data", {}).get("profile", "medium")

    if profile == "":
      fail("profile cannot be empty in profile-config")

    # === THE PROFILE MATRIX ===
    # Defines per-service scaling for each profile.
    # Services not listed here keep their upstream defaults.

    # Service tiers for replica scaling:
    #   tier-1 (user-facing): frontend, frontend-proxy
    #   tier-2 (business-critical): checkout, cart, payment, product-catalog
    #   tier-3 (supporting): all other shop services
    #   infra: kafka, postgresql, flagd, valkey-cart
    #   observability: otel-collector, prometheus, grafana, jaeger, opensearch

    profiles = {
      "default": {
        "description": "Upstream defaults from the OpenTelemetry demo",
        # --- Replicas ---
        "tier1_replicas": 1,
        "tier2_replicas": 1,
        "tier3_replicas": 1,
        "infra_replicas": 1,
        # --- Observability enablement ---
        "grafana_replicas": 1,
        "jaeger_replicas": 1,
        "opensearch_replicas": 1,
        "prometheus_replicas": 1,
        # --- Memory scaling factor (applied to upstream defaults) ---
        "memory_factor": 1.0,
        # --- CPU requests ---
        "add_cpu_requests": False,
      },
      "small": {
        "description": "Minimal footprint for local development and CI",
        # --- Replicas ---
        "tier1_replicas": 1,
        "tier2_replicas": 1,
        "tier3_replicas": 1,
        "infra_replicas": 1,
        # --- Observability enablement ---
        "grafana_replicas": 0,       # disabled
        "jaeger_replicas": 0,        # disabled
        "opensearch_replicas": 0,    # disabled
        "prometheus_replicas": 1,    # kept for basic metrics
        # --- Memory scaling factor (applied to upstream defaults) ---
        "memory_factor": 0.75,
        # --- CPU requests (none for small) ---
        "add_cpu_requests": False,
      },
      "medium": {
        "description": "Balanced for staging and demos",
        # --- Replicas ---
        "tier1_replicas": 2,
        "tier2_replicas": 2,
        "tier3_replicas": 1,
        "infra_replicas": 2,
        # --- Observability enablement ---
        "grafana_replicas": 1,
        "jaeger_replicas": 1,
        "opensearch_replicas": 1,
        "prometheus_replicas": 1,
        # --- Memory scaling factor ---
        "memory_factor": 1.0,
        # --- CPU requests ---
        "add_cpu_requests": True,
      },
      "large": {
        "description": "Production-grade with high availability",
        # --- Replicas ---
        "tier1_replicas": 3,
        "tier2_replicas": 3,
        "tier3_replicas": 2,
        "infra_replicas": 2,
        # --- Observability enablement ---
        "grafana_replicas": 1,
        "jaeger_replicas": 1,
        "opensearch_replicas": 1,
        "prometheus_replicas": 1,
        # --- Memory scaling factor ---
        "memory_factor": 2.0,
        # --- CPU requests ---
        "add_cpu_requests": True,
      },
    }

    if profile not in profiles:
      fail("Unsupported profile: " + profile + ". Allowed: default, small, medium, large")

    p = profiles[profile]

    # === SERVICE CLASSIFICATION ===
    tier1 = ["frontend", "frontend-proxy"]
    tier2 = ["checkout", "cart", "payment", "product-catalog"]
    tier3 = [
      "shipping", "quote", "currency", "recommendation", "ad",
      "email", "accounting", "fraud-detection", "image-provider",
      "llm", "load-generator", "product-reviews",
    ]
    infra = ["kafka", "postgresql", "flagd", "valkey-cart"]

    # Build name -> replicas mapping
    replica_map = {}
    for name in tier1:
      replica_map[name] = p["tier1_replicas"]
    for name in tier2:
      replica_map[name] = p["tier2_replicas"]
    for name in tier3:
      replica_map[name] = p["tier3_replicas"]
    for name in infra:
      replica_map[name] = p["infra_replicas"]

    # Observability overrides
    obs_replica_map = {
      "grafana": p["grafana_replicas"],
      "jaeger": p["jaeger_replicas"],
      "prometheus": p["prometheus_replicas"],
    }
    obs_statefulset_map = {
      "opensearch": p["opensearch_replicas"],
    }

    # === APPLY MUTATIONS ===
    for r in resources:
      kind = r.get("kind", "")
      name = r.get("metadata", {}).get("name", "")

      # --- Shop Deployments: replicas + memory + cpu ---
      if kind == "Deployment" and name in replica_map:
        r["spec"]["replicas"] = replica_map[name]
        reset_resources(r, name, p["memory_factor"])
        if p["add_cpu_requests"]:
          add_cpu(r, name, profile)
        else:
          reset_cpu(r, name)

      # --- Observability Deployments: replicas + memory ---
      if kind == "Deployment" and name in obs_replica_map:
        r["spec"]["replicas"] = obs_replica_map[name]
        reset_resources(r, name, p["memory_factor"])

      # --- Observability StatefulSets: replicas + memory ---
      if kind == "StatefulSet" and name in obs_statefulset_map:
        r["spec"]["replicas"] = obs_statefulset_map[name]
        reset_resources(r, name, p["memory_factor"])

      # --- DaemonSets (otel-collector): memory only ---
      if kind == "DaemonSet":
        reset_resources(r, name, p["memory_factor"])

  # ─── Helper functions ───

  def parse_memory(value):
    """Parse a Kubernetes memory string (e.g., '250Mi', '1Gi') into megabytes."""
    if value.endswith("Gi"):
      return int(float(value[:-2]) * 1024)
    elif value.endswith("Mi"):
      return int(value[:-2])
    elif value.endswith("Ki"):
      return int(float(value[:-2]) / 1024)
    return int(value)

  def format_memory(mb):
    """Format megabytes back into a Kubernetes memory string."""
    if mb >= 1024 and mb % 1024 == 0:
      return str(mb // 1024) + "Gi"
    return str(mb) + "Mi"

  def reset_resources(resource, name, memory_factor):
    """Reset a resource's limits/requests to upstream defaults scaled by memory_factor.

    Instead of multiplying the current (possibly stale) values, this always
    computes: upstream_default * memory_factor.  This makes every profile
    transition idempotent — large -> default correctly restores the original
    memory values instead of leaving them doubled.
    """
    upstream_mem_limit = UPSTREAM_MEMORY_LIMITS.get(name, "")
    upstream_mem_request = UPSTREAM_MEMORY_REQUESTS.get(name, "")
    upstream_cpu_limit = UPSTREAM_CPU_LIMITS.get(name, "")
    upstream_cpu_request = UPSTREAM_CPU_REQUESTS.get(name, "")

    # Nothing to set for this service (e.g. llm has no resources)
    if not upstream_mem_limit and not upstream_mem_request:
      return

    containers = resource.get("spec", {}).get("template", {}).get("spec", {}).get("containers", [])
    for container in containers:
      res = container.get("resources") or {}
      limits = res.get("limits") or {}
      requests = res.get("requests") or {}

      # --- Memory limit: always set from upstream baseline * factor ---
      if upstream_mem_limit:
        base_mb = parse_memory(upstream_mem_limit)
        scaled_mb = max(int(base_mb * memory_factor), 16)  # floor at 16Mi
        limits["memory"] = format_memory(scaled_mb)
      elif "memory" in limits:
        # Service has no upstream memory limit — remove any stale one
        limits.pop("memory")

      # --- Memory request: always set from upstream baseline * factor ---
      if upstream_mem_request:
        base_mb = parse_memory(upstream_mem_request)
        scaled_mb = max(int(base_mb * memory_factor), 16)  # floor at 16Mi
        requests["memory"] = format_memory(scaled_mb)
      elif "memory" in requests:
        # Service has no upstream memory request — remove any stale one
        requests.pop("memory")

      # --- CPU limit: restore upstream value (not scaled) ---
      if upstream_cpu_limit:
        limits["cpu"] = upstream_cpu_limit
      elif "cpu" in limits:
        # Service has no upstream CPU limit — remove any stale one
        limits.pop("cpu")

      # --- CPU request: restore upstream value (not scaled) ---
      # Note: profile-added CPU requests are handled separately by add_cpu/reset_cpu
      if upstream_cpu_request:
        requests["cpu"] = upstream_cpu_request
      # Don't remove cpu requests here — reset_cpu/add_cpu handles that

      # Write back
      if limits:
        res["limits"] = limits
      if requests:
        res["requests"] = requests
      container["resources"] = res

  def reset_cpu(resource, name):
    """Remove profile-added CPU requests, restoring to upstream defaults.

    If the service has an upstream CPU request (e.g. opensearch: 1000m),
    that value is preserved. Otherwise, any CPU request is removed.
    """
    upstream_cpu_request = UPSTREAM_CPU_REQUESTS.get(name, "")
    containers = resource.get("spec", {}).get("template", {}).get("spec", {}).get("containers", [])
    for container in containers:
      res = container.get("resources")
      if not res:
        continue
      requests = res.get("requests")
      if not requests:
        continue
      if "cpu" in requests:
        if upstream_cpu_request:
          requests["cpu"] = upstream_cpu_request
        else:
          requests.pop("cpu")

  def add_cpu(resource, name, profile):
    """Add CPU requests for medium/large profiles on high-traffic services."""
    cpu_map = {
      "medium": {
        "frontend": "100m", "checkout": "100m", "cart": "50m",
        "payment": "50m", "product-catalog": "50m", "kafka": "200m",
        "postgresql": "100m", "recommendation": "100m",
      },
      "large": {
        "frontend": "250m", "checkout": "200m", "cart": "100m",
        "payment": "100m", "product-catalog": "100m", "kafka": "500m",
        "postgresql": "250m", "recommendation": "200m",
        "ad": "100m", "llm": "200m", "load-generator": "200m",
      },
    }
    if profile not in cpu_map or name not in cpu_map[profile]:
      return
    containers = resource.get("spec", {}).get("template", {}).get("spec", {}).get("containers", [])
    for container in containers:
      if container.get("name") == name:
        res = container.get("resources") or {}
        requests = res.get("requests") or {}
        requests["cpu"] = cpu_map[profile][name]
        res["requests"] = requests
        container["resources"] = res

  setup_profile(ctx.resource_list["items"])
