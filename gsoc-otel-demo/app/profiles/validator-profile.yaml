apiVersion: fn.kpt.dev/v1alpha1
kind: StarlarkRun
metadata:
  name: validator-profile
  annotations:
    config.kubernetes.io/local-config: "true"
source: |-
  def validate_profile(ctx):
    for r in ctx.resource_list["items"]:
      if r.get("kind") == "ConfigMap" and r.get("metadata", {}).get("name") == "profile-config":
        profile = r.get("data", {}).get("profile", "")
        valid_profiles = ["small", "medium", "large"]
        if profile not in valid_profiles:
          fail("profile '" + profile + "' is invalid. Allowed values: small, medium, large")
    return

  validate_profile(ctx)
