apiVersion: fn.kpt.dev/v1alpha1
kind: StarlarkRun
metadata:
  name: setup-chaos
  annotations:
    config.kubernetes.io/local-config: "true"
source: "load(\"krmfn.star\", \"krmfn\")\n\ndef setup_chaos(resources):\n  scenario = \"off\"\n\n  # Read scenario from config\n  for r in resources:\n    if krmfn.match_gvk(r, \"v1\", \"ConfigMap\") and krmfn.match_name(r, \"chaos-config\"):\n      scenario = r.get(\"data\", {}).get(\"scenario\", \"off\")\n\n  if scenario == \"\":\n    fail(\"scenario cannot be empty in chaos-config\")\n\n  # Define the chaos mapping\n  chaos_matrix = {\n    \"off\": {},\n    \"payment-outage\": {\n      \"paymentFailure\": \"100%\",\n      \"paymentUnreachable\": \"on\"\n    },\n    \"high-load\": {\n      \"loadGeneratorFloodHomepage\": \"on\",\n      \"adHighCpu\": \"on\",\n      \"kafkaQueueProblems\": \"on\"\n    },\n    \"broken-catalog\": {\n      \"productCatalogFailure\": \"on\",\n      \"recommendationCacheFailure\": \"on\"\n    },\n    \"memory-leak\": {\n      \"emailMemoryLeak\": \"100x\",\n      \"adManualGc\": \"on\"\n    }\n  }\n\n  if scenario not in chaos_matrix:\n    fail(\"Unsupported chaos scenario: \" + scenario)\n\n  flags_to_enable = chaos_matrix[scenario]\n\n  # Gather all chaos flags we know about\n  all_chaos_flags = []\n  for scenario_name, scenario_flags in chaos_matrix.items():\n    for f in scenario_flags:\n      if f not in all_chaos_flags:\n        all_chaos_flags.append(f)\n\n  # Find the flagd-config ConfigMap and mutate the JSON string\n  for r in resources:\n    if krmfn.match_gvk(r, \"v1\", \"ConfigMap\") and krmfn.match_name(r, \"flagd-config\"):\n      raw_json = r.get(\"data\", {}).get(\"demo.flagd.json\", \"\")\n      if raw_json == \"\":\n        fail(\"demo.flagd.json not found in flagd-config\")\n      \n      # We don't have a json parser in this starlark environment, so we will use\n      # line-by-line string replacement. We assume the JSON format is consistent.\n      lines = raw_json.split(\"\\n\")\n      new_lines = []\n      current_flag = \"\"\n      \n      for line in lines:\n        # Track the current flag context\n        for flag in all_chaos_flags:\n          if '\"' + flag + '\": {' in line:\n            current_flag = flag\n            break\n        \n        # If we are in a known flag's context and hit defaultVariant\n        if current_flag != \"\" and '\"defaultVariant\":' in line:\n          variant = flags_to_enable.get(current_flag, \"off\")\n          \n          # Reconstruct the line preserving leading whitespace\n          colon_idx = line.find(\":\")\n          if colon_idx != -1:\n            prefix = line[:colon_idx+1]\n            suffix = \",\" if line.strip().endswith(\",\") else \"\"\n            line = prefix + ' \"' + variant + '\"' + suffix\n            \n          current_flag = \"\" # Reset context after updating\n          \n        new_lines.append(line)\n        \n      r[\"data\"][\"demo.flagd.json\"] = \"\\n\".join(new_lines)\n      break\n\nsetup_chaos(ctx.resource_list[\"items\"])"
