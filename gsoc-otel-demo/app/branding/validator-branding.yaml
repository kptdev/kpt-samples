apiVersion: fn.kpt.dev/v1alpha1
kind: StarlarkRun
metadata:
  name: validator-branding
  annotations:
    config.kubernetes.io/local-config: "true"
source: |-
  def validate_branding(ctx):
    for r in ctx.resource_list["items"]:
      if r.get("kind") == "ConfigMap" and r.get("metadata", {}).get("name") == "branding-config":
        store_type = r.get("data", {}).get("storeType", "")
        valid_types = ["astronomy", "florist"]
        if store_type not in valid_types:
          fail("storeType '" + store_type + "' is invalid. Allowed values: astronomy, florist, car-accessories")
    return

  validate_branding(ctx)
