apiVersion: fn.kpt.dev/v1alpha1
kind: ApplyReplacements
metadata:
  name: branding-image-provider
  annotations:
    config.kubernetes.io/local-config: "true"
replacements:
- sourceValue: "florist:v1"
  targets:
  - select:
      kind: Deployment
      name: image-provider
    fieldPaths:
    - spec.template.spec.containers.[name=image-provider].image
