apiVersion: v1
kind: ConfigMap
metadata:
  name: florist-postgresql-init
  annotations:
    config.kubernetes.io/local-config: "true"
  namespace: otel-demo
data:
  init.sql: |
    -- Copyright The OpenTelemetry Authors
    -- SPDX-License-Identifier: Apache-2.0

    CREATE USER otelu WITH PASSWORD 'otelp';

    -- Accounting Service: create a schema
    CREATE SCHEMA accounting;
    GRANT USAGE ON SCHEMA accounting TO otelu;

    -- Accounting Service: create tables
    CREATE TABLE accounting."order" (
        order_id TEXT PRIMARY KEY
    );

    CREATE TABLE accounting.shipping (
        shipping_tracking_id TEXT PRIMARY KEY,
        shipping_cost_currency_code TEXT NOT NULL,
        shipping_cost_units BIGINT NOT NULL,
        shipping_cost_nanos INT NOT NULL,
        street_address TEXT,
        city TEXT,
        state TEXT,
        country TEXT,
        zip_code TEXT,
        order_id TEXT NOT NULL,
        FOREIGN KEY (order_id) REFERENCES accounting."order"(order_id) ON DELETE CASCADE
    );

    CREATE TABLE accounting.orderitem (
        item_cost_currency_code TEXT NOT NULL,
        item_cost_units BIGINT NOT NULL,
        item_cost_nanos INT NOT NULL,
        product_id TEXT NOT NULL,
        quantity INT NOT NULL,
        order_id TEXT NOT NULL,
        PRIMARY KEY (order_id, product_id),
        FOREIGN KEY (order_id) REFERENCES accounting."order"(order_id) ON DELETE CASCADE
    );

    -- Accounting Service: grant permission to schema
    GRANT SELECT, INSERT, UPDATE ON ALL TABLES IN SCHEMA accounting TO otelu;

    -- Product Review Service: create a schema
    CREATE SCHEMA reviews;
    GRANT USAGE ON SCHEMA reviews TO otelu;

    -- Product Review Service: create tables
    CREATE TABLE reviews.productreviews (
        id INTEGER GENERATED BY DEFAULT AS IDENTITY PRIMARY KEY,
        product_id VARCHAR(16) NOT NULL,
        username VARCHAR(64) NOT NULL,
        description VARCHAR(1024),
        score NUMERIC(2,1) NOT NULL
    );

    -- Product Review Service: create index for product_id lookups
    CREATE INDEX product_id_index ON reviews.productreviews (product_id);

    -- Product Review Service: grant permission to schema
    GRANT SELECT, INSERT, UPDATE ON ALL TABLES IN SCHEMA reviews TO otelu;

    -- Product Review Service:  add product review data
    INSERT INTO reviews.productreviews (product_id, username, description, score)
    VALUES
        ('FLR001', 'flower_lover', 'These red roses were absolutely stunning! They arrived fresh and vibrant, and the bouquet lasted over a week. Perfect for anniversaries.', '5.0'),
        ('FLR001', 'romantic_guy', 'Ordered these for Valentine''s Day and my partner was thrilled. The fragrance filled the room. Highly recommend for any romantic occasion.', '4.5'),
        ('FLR001', 'gift_giver', 'Beautiful packaging and the roses were in full bloom. Made a wonderful birthday gift. Will definitely order again.', '4.5'),
        ('FLR001', 'home_decorator', 'The deep red color was exactly as pictured. Added such elegance to my living room. Freshness guarantee is real.', '4.0'),
        ('FLR001', 'repeat_buyer', 'My third time ordering this bouquet. Consistent quality every time. The roses are always long-stemmed and gorgeous.', '5.0'),

        ('FLR002', 'minimalist_fan', 'The white lilies were pure elegance. Their subtle fragrance is heavenly without being overpowering. Perfect for modern décor.', '5.0'),
        ('FLR002', 'sympathy_sender', 'Sent these to a grieving friend. The pure white lilies brought comfort and peace. Arrangement was tasteful and dignified.', '4.5'),
        ('FLR002', 'scent_enthusiast', 'If you love natural floral scents, these lilies are a dream. Filled my hallway with the most divine fragrance for days.', '4.5'),
        ('FLR002', 'wedding_planner', 'Used these for a bridal shower centerpiece. Everyone asked where I got them. The lilies opened beautifully over the evening.', '5.0'),
        ('FLR002', 'office_buyer', 'Ordered for our reception desk. Professional, elegant, and they last so long. Great value for the quality.', '4.0'),

        ('FLR003', 'spring_fan', 'These tulips scream spring! Bright, cheerful colors that instantly lifted my mood. Perfect variety in the mix.', '5.0'),
        ('FLR003', 'budget_buyer', 'Great value for the price. The tulips were fresh and lasted nearly 10 days. A lovely affordable treat for myself.', '4.0'),
        ('FLR003', 'color_lover', 'Love the mix of pink, yellow, and purple tulips. Created such a joyful centerpiece. Exactly as shown on the website.', '4.5'),
        ('FLR003', 'garden_newbie', 'First time buying tulips online and was impressed. They arrived tightly closed and bloomed beautifully over two days.', '4.5'),
        ('FLR003', 'weekly_flower', 'I buy these every week. Never disappoint. The variety keeps things interesting and they always feel seasonal.', '5.0'),

        ('FLR004', 'luxury_buyer', 'This orchid arrangement is pure luxury. The ceramic pot is beautiful and the orchids look like a painting. Worth every penny.', '5.0'),
        ('FLR004', 'plant_parent', 'I''ve had this orchid pot for three months now and it''s still blooming! Extremely resilient and elegant. Instructions were helpful.', '4.5'),
        ('FLR004', 'corporate_gift', 'Sent this to a VIP client and they were incredibly impressed. The presentation is premium and the orchids are exquisite.', '5.0'),
        ('FLR004', 'home_office', 'Adds such sophistication to my home office. The white orchids against the pot are stunning. Low maintenance too.', '4.5'),
        ('FLR004', 'special_occasion', 'Bought for my mother''s 60th birthday. She has not stopped talking about it. The orchids are still going strong after a month.', '5.0'),

        ('FLR005', 'sunshine_seeker', 'These sunflowers are pure sunshine! They immediately brighten any room. Delivery was perfect and they were already open.', '5.0'),
        ('FLR005', 'kid_approved', 'Bought these for my daughter''s room and she absolutely loves them. So cheerful and fun. Great gift for teens.', '4.5'),
        ('FLR005', 'summer_party', 'Used these for a summer BBQ decoration. Everyone commented on how gorgeous they were. Very festive and farmhouse-chic.', '4.0'),
        ('FLR005', 'mood_booster', 'Whenever I feel down, I order this box. The sunflowers are so cheerful they instantly improve my mood. Fast delivery too.', '5.0'),
        ('FLR005', 'dried_flower_fan', 'Even after they dried, these sunflowers looked beautiful. I kept them as dried décor for months. Incredible longevity.', '4.5');

    -- Product Catalog Service: create a schema
    CREATE SCHEMA catalog;
    GRANT USAGE ON SCHEMA catalog TO otelu;

    -- Product Catalog Service: create tables
    CREATE TABLE catalog.products (
        id TEXT PRIMARY KEY,
        name TEXT NOT NULL,
        description TEXT,
        picture TEXT,
        price_currency_code TEXT NOT NULL,
        price_units BIGINT NOT NULL,
        price_nanos INT NOT NULL,
        categories TEXT
    );

    -- Product Catalog Service: grant permission to schema
    GRANT SELECT ON ALL TABLES IN SCHEMA catalog TO otelu;

    -- Product Catalog Service: add product data
    INSERT INTO catalog.products (id, name, description, picture, price_currency_code, price_units, price_nanos, categories)
    VALUES
        ('FLR001', 'Red Roses Bouquet', 'A dozen long-stemmed premium red roses hand-tied with eucalyptus and baby''s breath. Perfect for romantic occasions, anniversaries, or simply to say "I love you." Each rose is carefully selected for its velvety petals and rich crimson hue, then arranged in our signature wrapping.', 'RedRosesBouquet.jpg', 'USD', 29, 990000000, 'flowers'),
        ('FLR002', 'White Lilies Arrangement', 'An elegant arrangement of pure white oriental lilies nestled in a sleek glass vase. Their delicate fragrance fills any room with tranquility. Ideal for weddings, sympathy gestures, or sophisticated home décor. Each stem features 3-5 large trumpet blooms.', 'WhiteLiliesArrangement.png', 'USD', 34, 500000000, 'flowers'),
        ('FLR003', 'Spring Tulip Mix', 'A vibrant medley of seasonal tulips in pink, yellow, and soft purple. These cheerful blooms are perfect for celebrating new beginnings, birthdays, or brightening up your workspace. Delivered in bud form so you can watch them unfurl into full beauty.', 'SpringTulipMix.png', 'USD', 19, 990000000, 'flowers'),
        ('FLR004', 'Orchid Elegance Pot', 'A stunning phalaenopsis orchid displayed in a premium white ceramic pot. This long-lasting beauty blooms for months with minimal care. Each pot contains two mature orchid stems with 8-12 blossoms, creating an eye-catching centerpiece that exudes sophistication.', 'OrchidElegancePot.jpg', 'USD', 49, 990000000, 'flowers,premium'),
        ('FLR005', 'Sunflower Sunshine Box', 'Five bold sunflowers arranged with greenery and billy buttons in our signature sunshine box. These radiant blooms are guaranteed to bring a smile. The cheerful golden petals and dark centers create an instant mood lifter for any occasion.', 'SunflowerSunshineBox.jpg', 'USD', 24, 990000000, 'flowers');
